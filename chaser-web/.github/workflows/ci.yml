name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_dummy
      CLERK_SECRET_KEY: sk_test_ci_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws/match
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync Ruby WASM asset
        run: bun run ruby-wasm:sync

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Build
        run: bun run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: checks
    env:
      CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${{ secrets.E2E_NEXT_PUBLIC_CLERK_SIGN_IN_URL || '/sign-in' }}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${{ secrets.E2E_NEXT_PUBLIC_CLERK_SIGN_UP_URL || '/sign-up' }}
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws/match
      E2E_CLERK_OWNER_EMAIL: ${{ secrets.E2E_CLERK_OWNER_EMAIL }}
      E2E_CLERK_PLAYER_EMAIL: ${{ secrets.E2E_CLERK_PLAYER_EMAIL }}
      E2E_CLERK_SPECTATOR_EMAIL: ${{ secrets.E2E_CLERK_SPECTATOR_EMAIL }}
      PW_WORKERS: 1
    steps:
      - name: Checkout
        if: ${{ env.CLERK_SECRET_KEY != '' && env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        uses: actions/checkout@v6

      - name: Setup Bun
        if: ${{ env.CLERK_SECRET_KEY != '' && env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: ${{ env.CLERK_SECRET_KEY != '' && env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        if: ${{ env.CLERK_SECRET_KEY != '' && env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        run: bunx playwright install --with-deps chromium

      - name: Run E2E
        if: ${{ env.CLERK_SECRET_KEY != '' && env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        run: bun run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() && env.CLERK_SECRET_KEY != '' && env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
