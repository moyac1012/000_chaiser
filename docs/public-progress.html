<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="CHaserの開発進捗">
<title>CHaser 開発進捗</title>
<style>
:root{--ink:#0f172a;--soft:#475569;--muted:#64748b;--line:#dbe3ee;--paper:#fff;--bg:#f5f7fb;--cool:#0ea5e9;--hot:#f43f5e;--violet:#7c3aed;--ok:#15803d;--plan:#64748b;--active:#c2410c}
*{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(760px 420px at 8% 0%,#dff4ff 0%,transparent 65%),radial-gradient(720px 420px at 100% 7%,#ffe4ef 0%,transparent 60%),var(--bg);line-height:1.6}.shell{max-width:1120px;margin:0 auto;padding:0 22px 56px}.top{padding:18px 0 8px;display:flex;align-items:center;gap:12px;color:var(--soft);font-size:13px}.brand{font-weight:850;letter-spacing:.07em;color:var(--ink)}.brand b{color:var(--cool)}.top a{margin-left:auto;color:var(--soft);text-decoration:none;border-bottom:1px dashed #94a3b8}.hero{background:linear-gradient(125deg,#0f172a 0%,#1e293b 56%,#172554 100%);border:1px solid rgba(148,163,184,.28);box-shadow:0 20px 54px rgba(15,23,42,.18);border-radius:28px;padding:44px 42px;color:white;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;width:380px;height:380px;border-radius:50%;right:-120px;top:-230px;background:radial-gradient(circle,rgba(56,189,248,.35),transparent 68%)}.eyebrow{display:flex;align-items:center;gap:10px;position:relative;z-index:1;font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:#b7d8ec;font-weight:750}.status{border-radius:999px;padding:4px 10px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);color:white;letter-spacing:.08em;font-size:11px}.hero h1{position:relative;z-index:1;font-size:clamp(31px,5vw,54px);line-height:1.08;margin:15px 0 14px;letter-spacing:-.04em}.hero p{position:relative;z-index:1;max-width:760px;margin:0;color:#d8e2ef;font-size:15px}.updated{position:relative;z-index:1;margin-top:22px;color:#9fb0c4;font-size:12px}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin:20px 0}.metric{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:18px;padding:17px 18px;box-shadow:0 6px 20px rgba(15,23,42,.05)}.metric-label{font-size:11px;color:var(--muted);font-weight:750;letter-spacing:.1em;text-transform:uppercase}.metric-value{font-size:26px;font-weight:850;letter-spacing:-.03em;margin:3px 0}.metric-note{font-size:12px;color:var(--soft)}.grid{display:grid;grid-template-columns:1.08fr .92fr;gap:18px}.panel{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 8px 26px rgba(15,23,42,.055)}h2{font-size:18px;margin:0 0 14px;letter-spacing:-.02em}.list{display:grid;gap:10px}.highlight{display:flex;gap:10px;align-items:flex-start;color:var(--soft);font-size:14px}.highlight:before{content:"✓";display:grid;place-items:center;width:20px;height:20px;flex:0 0 20px;border-radius:50%;background:#e0f2fe;color:#0369a1;font-size:12px;font-weight:900;margin-top:1px}.next{background:linear-gradient(135deg,#f5f3ff,#eef2ff);border-color:#ddd6fe}.next p{color:var(--soft);font-size:14px;margin:0}.timeline{display:grid;gap:11px}.update{border-left:3px solid #cbd5e1;padding:1px 0 1px 14px}.update-date{font-size:11px;color:var(--muted);font-weight:750;letter-spacing:.08em}.update-title{font-weight:800;margin-top:1px}.update-detail{font-size:13px;color:var(--soft)}.milestones{display:grid;gap:10px}.milestone{border:1px solid var(--line);border-radius:14px;padding:13px 14px}.milestone-top{display:flex;align-items:center;gap:10px}.milestone-title{font-weight:800;flex:1}.state{font-size:10px;font-weight:850;letter-spacing:.09em;text-transform:uppercase;border-radius:999px;padding:3px 8px}.done{background:#dcfce7;color:#166534}.active{background:#ffedd5;color:#9a3412}.planned{background:#e2e8f0;color:#475569}.milestone-detail{font-size:13px;color:var(--soft);margin-top:5px}.phase-summary{margin-top:18px;display:none}.phase-summary.show{display:block}.phase-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px}.phase{padding:10px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0}.phase-name{font-size:12px;font-weight:800}.phase-count{font-size:12px;color:var(--soft)}.links{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}.link{font-size:13px;font-weight:750;text-decoration:none;color:#075985;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:999px;padding:7px 12px}.loading,.error{max-width:820px;margin:90px auto;text-align:center;background:white;border:1px solid var(--line);border-radius:18px;padding:32px;color:var(--soft)}.footer{font-size:11px;color:#94a3b8;text-align:center;margin-top:30px}@media(max-width:720px){.shell{padding:0 14px 36px}.hero{padding:32px 24px}.metrics,.grid{grid-template-columns:1fr}.top{font-size:11px}.hero h1{font-size:36px}}
</style>
</head>
<body>
<div class="shell">
  <div class="top"><span class="brand">CH<b>aser</b></span><span>Public Development Log</span><a href="index.html">ツールハブへ</a></div>
  <div id="app" class="loading">公開進捗データを読み込んでいます…</div>
</div>
<script>
const DATA_URL='./data/public-progress.json';
const esc=(value)=>String(value??'').replace(/[&<>"']/g,ch=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
const fmtDate=(value)=>{const d=new Date(value);return Number.isNaN(d.getTime())?esc(value):new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'long',day:'numeric'}).format(d)};
const stateClass=(state)=>['done','active','planned'].includes(state)?state:'planned';
async function stageSummary(url){
  if(!url)return null;
  const response=await fetch(`${url}${url.includes('?')?'&':'?'}v=${Date.now()}`,{cache:'no-store'});
  if(!response.ok)throw new Error('ステージJSONを取得できませんでした');
  const data=await response.json();
  const phases=Array.isArray(data)?data:(Array.isArray(data.phases)?data.phases:[]);
  const visible=(phase)=>Array.isArray(phase.stages)?phase.stages.filter(stage=>stage.includeInExport!==false):[];
  const rows=phases.map(phase=>({id:phase.id||'–',name:phase.name||'無題',count:visible(phase).length})).filter(item=>item.count>0);
  return {count:rows.reduce((sum,row)=>sum+row.count,0),phases:rows};
}
function render(data,summary){
  document.title=`${data.title||'CHaser 開発進捗'} | CHaser`;
  const metrics=[...(data.metrics||[])];
  if(summary){metrics.unshift({label:'公開ステージ',value:`${summary.count}件`,note:`${summary.phases.length}フェーズを公開中`});}
  const links=(data.links||[]).map(link=>`<a class="link" href="${esc(link.href)}">${esc(link.label)}</a>`).join('');
  const highlights=(data.highlights||[]).map(item=>`<div class="highlight">${esc(item)}</div>`).join('');
  const updates=(data.updates||[]).map(item=>`<div class="update"><div class="update-date">${fmtDate(item.date)}</div><div class="update-title">${esc(item.title)}</div><div class="update-detail">${esc(item.detail)}</div></div>`).join('')||'<div class="update-detail">更新履歴は準備中です。</div>';
  const milestones=(data.milestones||[]).map(item=>`<div class="milestone"><div class="milestone-top"><div class="milestone-title">${esc(item.title)}</div><span class="state ${stateClass(item.state)}">${esc(item.label||item.state)}</span></div><div class="milestone-detail">${esc(item.detail)}</div></div>`).join('');
  const phases=summary?`<section class="phase-summary show"><h2>公開ステージの構成</h2><div class="phase-list">${summary.phases.map(phase=>`<div class="phase"><div class="phase-name">${esc(phase.id)} · ${esc(phase.name)}</div><div class="phase-count">${phase.count} ステージ</div></div>`).join('')}</div></section>`:'';
  document.getElementById('app').outerHTML=`
    <section class="hero">
      <div class="eyebrow"><span>${esc(data.tagline||'CHaser')}</span><span class="status">${esc(data.statusLabel||'開発中')}</span></div>
      <h1>${esc(data.title||'CHaser 開発進捗')}</h1>
      <p>${esc(data.headline||'開発の進捗を公開しています。')}</p>
      <p style="margin-top:10px">${esc(data.summary||'')}</p>
      <div class="updated">最終更新: ${fmtDate(data.updatedAt||'')}</div>
    </section>
    <section class="metrics">${metrics.map(metric=>`<div class="metric"><div class="metric-label">${esc(metric.label)}</div><div class="metric-value">${esc(metric.value)}</div><div class="metric-note">${esc(metric.note||'')}</div></div>`).join('')}</section>
    <section class="grid">
      <div class="panel"><h2>現在できること</h2><div class="list">${highlights}</div>${phases}</div>
      <div class="panel next"><h2>次に取り組むこと</h2><p>${esc(data.next||'')}</p><div class="links">${links}</div></div>
      <div class="panel"><h2>更新履歴</h2><div class="timeline">${updates}</div></div>
      <div class="panel"><h2>マイルストーン</h2><div class="milestones">${milestones}</div></div>
    </section>
    <div class="footer">CHaser Public Development Log · JSON-driven static page</div>`;
}
(async()=>{try{const response=await fetch(`${DATA_URL}?v=${Date.now()}`,{cache:'no-store'});if(!response.ok)throw new Error(`${response.status}`);const data=await response.json();let summary=null;try{summary=await stageSummary(data.stageJsonUrl)}catch(error){console.warn(error)}render(data,summary)}catch(error){document.getElementById('app').className='error';document.getElementById('app').textContent=`公開進捗データを読み込めませんでした: ${error.message}`}})();
</script>
</body>
</html>
