<header class='head'><b>CH<span>aser</span></b><small>Stage Editor Blockly</small><div class='right'><button class='btn' id='load-default'>既定JSON読込</button><button class='btn' id='load-json'>JSON読込</button><input type='file' id='json-file' accept='.json,application/json' hidden><button class='btn' id='save-json'>JSON保存</button><button class='btn primary' id='export-review'>レビューHTML書き出し</button><button class='btn danger' id='clear-local'>ローカル破棄</button></div></header>

<script>
const STORAGE='chaiserStageBlockly';
const DEFAULT_JSON='../json/chaiser-stages-2026-05-15%20(8).json';
const TABS=[['edit','編集'],['play','Blockly実行'],['solution','模範解答'],['preview','プレビュー']];
const SETS=['BASIC','CHECK','STATE','LOOK','SEARCH','ENEMY','COUNT'];
const PAL=['#','.','I','C','H','G'];
const CLS={'#':'wall','.':'floor',' ':'floor',I:'item',C:'cool',H:'hot',G:'goal'};
const COLOR_ACTION='#f97316',COLOR_ON_TURN='#2563eb',COLOR_VIEW='#06b6d4',COLOR_STATE='#22c55e';
const DIRS=[['→ 右','Right'],['← 左','Left'],['↑ 上','Up'],['↓ 下','Down']];
const DIRS_UDLR=[['↑ 上','Up'],['↓ 下','Down'],['← 左','Left'],['→ 右','Right']];
const TILE_OPTIONS=[['床 (0)','0'],['プレイヤー (1)','1'],['ブロック (2)','2'],['アイテム (3)','3']];
const AROUND_INDEX={Up:1,Down:7,Left:3,Right:5};
let st={phases:[],phase:'',idx:0,tab:'edit',map:0,paint:'#',play:null,ws:null,timer:null,bot:null};
let blocksReady=false;
const escMap={'&':'&amp;','<':'&lt;','>':'&gt;'};
function esc(v){return String(v??'').replace(/[&<>']/g,c=>c===String.fromCharCode(39)?'&#39;':escMap[c]);}
function msg(t){const e=document.getElementById('toast');e.textContent=t;e.className='toast show';setTimeout(()=>e.className='toast',1800);}
function saveLocal(){localStorage.setItem(STORAGE,JSON.stringify({version:2,phases:st.phases}));}
function loadLocal(){try{const raw=localStorage.getItem(STORAGE);if(!raw)return false;loadObj(JSON.parse(raw));return true}catch(e){return false}}
function curPhase(){return st.phases.find(p=>p.id===st.phase)||st.phases[0]||null}
function curStage(){const p=curPhase();return p?p.stages[st.idx]||p.stages[0]||null:null}
function normalize(obj){const ps=Array.isArray(obj?.phases)?obj.phases:[];ps.forEach((p,pi)=>{p.id||=String.fromCharCode(65+pi);p.name||='無題グループ';p.color||='#64748b';p.stages||=[];p.stages.forEach((s,i)=>normStage(s,i+1))});return ps}
function normStage(s,no){s.no=Number(s.no||no);s.id||=`step-${String(s.no).padStart(2,'0')}-new`;s.title||='無題ステージ';s.blockSet||='BASIC';s.cond||='goal';s.goal||='';s.rule||='';s.maps=normMaps(s.maps);s.variants=s.maps.length;s.play||={};s.play.validation||=infer(s.cond);s.play.savedBlocklyXml||='';s.solution||={};s.solution.imageDataUrl||='';s.solution.imageName||='';s.solution.imageMimeType||='';s.solution.note||='';s.solution.updatedAt||=''}
function normMaps(ms){if(!Array.isArray(ms)||!ms.length)return[{label:'マップ A',rows:['#####','#C.G#','#####'],note:''}];return ms.map((m,i)=>({label:m.label||`マップ ${String.fromCharCode(65+i)}`,rows:Array.isArray(m.rows)&&m.rows.length?m.rows:['#####','#C.G#','#####'],note:m.note||''}))}
function num(t){const m=String(t||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).match(/\d+/);return m?Number(m[0]):undefined}
function infer(cond){const c=String(cond||'').toLowerCase(),n=num(c);if(c.includes('survive'))return{kind:'survive',minTurns:n||10,maxActions:n};if(c.includes('put'))return{kind:'winByPut',maxActions:n};if(c.includes('items')&&!c.includes('goal'))return{kind:'collectItems',minItems:n||1,maxActions:n};return{kind:'reachGoal',maxActions:n,requireAllItems:c.includes('items')||c.includes('goal+items')}}
function loadObj(obj){disposeBlockly();st.phases=normalize(obj);st.phase=st.phases[0]?.id||'';st.idx=0;st.map=0;st.play=null;st.bot=null;saveLocal();render()}
async function loadDefault(){try{const r=await fetch(DEFAULT_JSON,{cache:'no-store'});if(!r.ok)throw Error(r.status);loadObj(await r.json());msg('既定JSONを読み込みました')}catch(e){msg('既定JSON読込に失敗しました')}}
function render(){renderSide();renderMain()}
function renderSide(){const side=document.getElementById('side');if(!st.phases.length){side.innerHTML='<div class=empty>JSONを読み込んでください</div>';return}let h='<div class=section>グループ／ステージ</div>';st.phases.forEach(p=>{h+=`<div class=phase><div class=ph>${esc(p.id)} · ${esc(p.name)}</div>`;p.stages.forEach((s,i)=>{h+=`<div class='st ${p.id===st.phase&&i===st.idx?'active':''}' data-p='${esc(p.id)}' data-i='${i}'><b>${String(s.no).padStart(2,'0')}</b><span>${esc(s.title)}</span></div>`});h+='</div>'});side.innerHTML=h;side.querySelectorAll('.st').forEach(e=>e.onclick=()=>{disposeBlockly();st.phase=e.dataset.p;st.idx=Number(e.dataset.i);st.map=0;st.play=null;st.bot=null;render()})}
function renderMain(){const s=curStage(),main=document.getElementById('main');if(!s){main.innerHTML='<div class=empty>JSONを読み込んでください</div>';return}main.innerHTML=`<div class=tabs>${TABS.map(([id,l])=>`<div class='tab ${st.tab===id?'active':''}' data-tab='${id}'>${l}</div>`).join('')}</div><div id=body></div>`;main.querySelectorAll('.tab').forEach(e=>e.onclick=()=>{if(st.tab==='play')saveXml();disposeBlockly();st.tab=e.dataset.tab;renderMain()});if(st.tab==='edit')renderEdit(s);if(st.tab==='play')renderPlay(s);if(st.tab==='solution')renderSolution(s);if(st.tab==='preview')renderPreview(s)}
function bind(id,fn){const e=document.getElementById(id);e.oninput=()=>{fn(e.value);saveLocal()};e.onchange=e.oninput}
function renderEdit(s){const b=document.getElementById('body'),m=s.maps[st.map]||s.maps[0];b.innerHTML=`<div class=grid><div class=field><label>ID</label><input id=f-id class=mono value='${esc(s.id)}'></div><div class=field><label>タイトル</label><input id=f-title value='${esc(s.title)}'></div><div class=field><label>ブロックセット</label><select id=f-set>${SETS.map(x=>`<option ${x===s.blockSet?'selected':''}>${x}</option>`)}</select></div><div class=field><label>クリア条件</label><input id=f-cond value='${esc(s.cond)}'></div></div><div class=field><label>学習目標</label><textarea id=f-goal>${esc(s.goal)}</textarea></div><div class=field><label>反応型ルール</label><textarea id=f-rule class=mono>${esc(s.rule)}</textarea></div><div class=section>マップ編集</div><div class=field><label>対象マップ</label><select id=map-sel>${s.maps.map((x,i)=>`<option value='${i}' ${i===st.map?'selected':''}>${esc(x.label)}</option>`)}</select></div><div class=grid><div class=field><label>マップ名</label><input id=f-map-label value='${esc(m.label)}'></div><div class=field><label>マップ注記</label><input id=f-map-note value='${esc(m.note)}'></div></div><div>${PAL.map(ch=>`<button class='pal ${CLS[ch]} ${st.paint===ch?'active':''}' data-paint='${ch}'>${ch==='.'||ch==='#'?'':ch}</button>`).join('')}</div><div id=edit-map></div><div class=field><label>ASCIIマップ</label><textarea id=f-rows class=mono>${esc(m.rows.join(String.fromCharCode(10)))}</textarea><div class=hint>グリッドをマウスでドラッグして塗れます。ASCIIも直接編集できます。</div></div>`;bind('f-id',v=>s.id=v);bind('f-title',v=>{s.title=v;renderSide()});bind('f-set',v=>s.blockSet=v);bind('f-cond',v=>{s.cond=v;s.play.validation=infer(v)});bind('f-goal',v=>s.goal=v);bind('f-rule',v=>s.rule=v);document.getElementById('map-sel').onchange=e=>{st.map=Number(e.target.value);st.play=null;st.bot=null;renderMain()};bind('f-map-label',v=>m.label=v);bind('f-map-note',v=>m.note=v);bind('f-rows',v=>{m.rows=v.replace(new RegExp(String.fromCharCode(13),'g'),'').split(String.fromCharCode(10)).filter(Boolean);st.play=null;st.bot=null;drawEditMap(m)});document.querySelectorAll('.pal').forEach(e=>e.onclick=()=>{st.paint=e.dataset.paint;document.querySelectorAll('.pal').forEach(x=>x.classList.toggle('active',x.dataset.paint===st.paint))});drawEditMap(m)}
function drawEditMap(m){const w=Math.max(...m.rows.map(r=>r.length)),el=document.getElementById('edit-map');let h=`<div class='map edit' style='grid-template-columns:repeat(${w},28px)'>`;m.rows.forEach((r,y)=>{for(let x=0;x<w;x++){const ch=r[x]||'#';h+=`<div class='cell ${CLS[ch]||'floor'}' data-x='${x}' data-y='${y}'>${ch==='.'||ch==='#'?'':ch}</div>`}});h+='</div>';el.innerHTML=h;let down=false;const paint=c=>{const x=Number(c.dataset.x),y=Number(c.dataset.y);m.rows[y]=(m.rows[y]||'').padEnd(w,'#');m.rows[y]=m.rows[y].slice(0,x)+st.paint+m.rows[y].slice(x+1);document.getElementById('f-rows').value=m.rows.join(String.fromCharCode(10));saveLocal();st.play=null;st.bot=null;drawEditMap(m)};el.querySelectorAll('.cell').forEach(c=>{c.onmousedown=e=>{down=true;paint(c);e.preventDefault()};c.onmouseenter=()=>{if(down)paint(c)}});document.onmouseup=()=>down=false}

`;['walk','put'].forEach(method=>{g.forBlock['chaser_action_'+method]=b=>{const d=b.getFieldValue('DIR')||'Right';return `__chaserLastAction={kind:'${method}',dir:'${d}'};
api.${method+d}();
`}});['look','search'].forEach(method=>{g.forBlock['chaser_action_'+method]=b=>{const d=b.getFieldValue('DIR')||'Right';return [`(()=>{__chaserLastAction={kind:'${method}',dir:'${d}'};return api.${method+d}();})()`,0]};g.forBlock['chaser_action_'+method+'_store']=b=>{const d=b.getFieldValue('DIR')||'Right',n=g.getVariableName(b.getFieldValue('VAR'));return `__chaserLastAction={kind:'${method}',dir:'${d}'};
${n}=api.${method+d}();
`}});g.forBlock.chaser_get_tile=b=>[`api.around[${AROUND_INDEX[b.getFieldValue('DIR')]??5}]`,0];g.forBlock.chaser_is_tile=b=>[`api.around[${AROUND_INDEX[b.getFieldValue('DIR')]??5}]===${b.getFieldValue('TILE')||'0'}`,0];g.forBlock.chaser_get_around=b=>[`api.around[${g.valueToCode(b,'INDEX',0)||'0'}]`,0];g.forBlock.chaser_view_get_around=b=>[`(${g.valueToCode(b,'VIEW',0)||'[]'})[${g.valueToCode(b,'INDEX',0)||'0'}]`,0];g.forBlock.chaser_view_has_tile=b=>[`(${g.valueToCode(b,'VIEW',0)||'[]'}).includes(${b.getFieldValue('TILE')||'0'})`,0];g.forBlock.chaser_discard_value=b=>`${g.valueToCode(b,'VALUE',0)||'undefined'};
`;g.forBlock.chaser_tile_value=b=>[b.getFieldValue('TILE')||'0',0];g.forBlock.chaser_view_count_tile=b=>[`(${g.valueToCode(b,'VIEW',0)||'[]'}).filter(v=>v===${b.getFieldValue('TILE')||'0'}).length`,0]}
function toolbox(set){return{kind:'categoryToolbox',contents:[{kind:'category',name:'スタート・行動',colour:COLOR_ON_TURN,contents:[{kind:'block',type:'chaser_on_start'},{kind:'block',type:'chaser_on_turn'},{kind:'block',type:'chaser_action_walk'},{kind:'block',type:'chaser_action_put'},{kind:'block',type:'chaser_action_walk_last'},{kind:'block',type:'chaser_action_walk_random'},{kind:'block',type:'chaser_action_look'},{kind:'block',type:'chaser_action_search'},{kind:'block',type:'chaser_action_look_store'},{kind:'block',type:'chaser_action_search_store'},{kind:'block',type:'chaser_turn_end'}]},{kind:'category',name:'まわりを見る',colour:COLOR_VIEW,contents:[{kind:'block',type:'chaser_get_tile'},{kind:'block',type:'chaser_is_tile'},{kind:'block',type:'chaser_get_around'},{kind:'block',type:'chaser_view_get_around'},{kind:'block',type:'chaser_view_has_tile'},{kind:'block',type:'chaser_view_count_tile'},{kind:'block',type:'chaser_discard_value'},{kind:'block',type:'chaser_tile_value'}]},{kind:'category',name:'変数',colour:COLOR_STATE,contents:[{kind:'button',text:'変数を作成',callbackkey:'CREATE_VAR'},{kind:'block',type:'chaser_state_create'},{kind:'block',type:'chaser_state_set'},{kind:'block',type:'chaser_state_get'},{kind:'block',type:'chaser_state_change'},{kind:'block',type:'chaser_turn_number'},{kind:'block',type:'chaser_last_direction'},{kind:'block',type:'chaser_direction_value'}]},{kind:'sep'},{kind:'category',name:'条件',colour:'210',contents:[{kind:'block',type:'controls_if'},{kind:'block',type:'logic_compare'},{kind:'block',type:'logic_operation'},{kind:'block',type:'logic_boolean'},{kind:'block',type:'logic_negate'}]},{kind:'category',name:'数',colour:'230',contents:[{kind:'block',type:'math_number'},{kind:'block',type:'math_arithmetic'},{kind:'block',type:'math_modulo'},{kind:'block',type:'math_number_property'},{kind:'block',type:'math_random_int'},{kind:'block',type:'math_random_float'}]}]}}
function defaultXml(){return `<xml xmlns='https://developers.google.com/blockly/xml'><block type='chaser_on_turn' x='40' y='40'><statement name='DO'><block type='chaser_action_walk'><field name='DIR'>Up</field><next><block type='chaser_turn_end'></block></next></block></statement></block></xml>`}
function disposeBlockly(){if(st.ws){saveXml();st.ws.dispose();st.ws=null}stopAuto()}
function renderPlay(s){const b=document.getElementById('body');if(!st.play)st.play=initPlay(s,st.map);b.innerHTML=`<div class=play><div class=panel><div class=field><label>対象マップ</label><select id=play-map>${s.maps.map((m,i)=>`<option value='${i}' ${i===st.map?'selected':''}>${esc(m.label)}</option>`)}</select></div><div id=board></div><div id=status></div><div class=controls><button class='btn primary' id=one>1ターン実行</button><button class=btn id=auto>自動実行</button><button class='btn warn' id=stop>停止</button><button class='btn warn' id=reset>リセット</button><button class=btn id=xml-save>Blockly保存</button></div><div class=section>実行ログ</div><pre class=log id=log></pre></div><div><div class=hint>実行ボタンは、失敗・成功後なら初期状態に戻して、現在のBlocklyプログラムを再コンパイルしてから実行します。</div><div class=blockly id=blockly></div></div></div>`;document.getElementById('play-map').onchange=e=>{saveXml();st.map=Number(e.target.value);st.play=initPlay(s,st.map);st.bot=null;drawRuntime()};document.getElementById('one').onclick=()=>{runOneFromButton(s)};document.getElementById('auto').onclick=()=>startAuto(s);document.getElementById('stop').onclick=stopAuto;document.getElementById('reset').onclick=()=>{resetRuntime(s);drawRuntime()};document.getElementById('xml-save').onclick=()=>{saveXml();msg('Blockly XMLを保存しました')};drawRuntime();initBlockly(s)}
function initBlockly(s){registerBlocks();st.ws=Blockly.inject('blockly',{toolbox:toolbox(s.blockSet),trashcan:true,scrollbars:true});st.ws.registerButtonCallback('CREATE_VAR',()=>Blockly.Variables.createVariableButtonHandler(st.ws));try{Blockly.Xml.domToWorkspace(Blockly.utils.xml.textToDom(s.play.savedBlocklyXml||defaultXml()),st.ws)}catch(e){Blockly.Xml.domToWorkspace(Blockly.utils.xml.textToDom(defaultXml()),st.ws)}st.ws.addChangeListener(()=>{st.bot=null})}
function saveXml(){const s=curStage();if(s&&st.ws){s.play.savedBlocklyXml=Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(st.ws));saveLocal()}}
function initPlay(s,i){const m=s.maps[i]||s.maps[0],p=parseMap(m.rows);return{tiles:p.tiles,cool:p.cool,hot:p.hot,goal:p.goal,turn:0,items:0,status:'running',msg:'Blockly実行待機中',logs:[`map: ${m.label}`],validation:s.play.validation||infer(s.cond),pending:null,lastDir:'Up'}}
function resetRuntime(s){saveXml();st.play=initPlay(s,st.map);st.bot=compileBot();try{if(st.bot.onStart)st.bot.onStart(makeApi())}catch(e){fail(`初期化エラー: ${e.message}`)}}
function ensureRunningFromButton(s){if(!st.play||st.play.status!=='running'||!st.bot){resetRuntime(s)}}
function parseMap(rows){let cool=null,hot=null,goal=null;const tiles=rows.map((r,y)=>[...r].map((ch,x)=>{if(ch==='C'){cool={x,y};return'.'}if(ch==='H'){hot={x,y};return'.'}if(ch==='G'){goal={x,y};return'.'}return ch}));return{tiles,cool:cool||{x:1,y:1},hot,goal}}
function delta(d){return{Up:{x:0,y:-1},Down:{x:0,y:1},Left:{x:-1,y:0},Right:{x:1,y:0}}[d]||{x:0,y:0}}
function tileAt(p,x,y){if(y<0||y>=p.tiles.length||x<0||x>=p.tiles[y].length)return 2;if(p.hot&&p.hot.x===x&&p.hot.y===y)return 1;if(p.cool&&p.cool.x===x&&p.cool.y===y)return 1;const ch=p.tiles[y][x];return ch==='#'?2:ch==='I'?3:0}
function around(){const p=st.play,arr=[];for(let dy=-1;dy<=1;dy++){for(let dx=-1;dx<=1;dx++){arr.push(tileAt(p,p.cool.x+dx,p.cool.y+dy))}}return arr}
function look(dir){return around()}
function search(dir){const p=st.play,d=delta(dir),arr=[];for(let i=1;i<=9;i++){arr.push(tileAt(p,p.cool.x+d.x*i,p.cool.y+d.y*i))}return arr}
function makeApi(){const api={around:around()};['Up','Down','Left','Right'].forEach(dir=>{api['walk'+dir]=()=>{st.play.pending={kind:'walk',dir};st.play.lastDir=dir};api['put'+dir]=()=>{st.play.pending={kind:'put',dir};st.play.lastDir=dir};api['look'+dir]=()=>{st.play.pending={kind:'look',dir};st.play.lastDir=dir;return look(dir)};api['search'+dir]=()=>{st.play.pending={kind:'search',dir};st.play.lastDir=dir;return search(dir)}});return api}
function compileBot(){const g=gen();g.init(st.ws);const code=g.workspaceToCode(st.ws);const varNames=st.ws.getVariableMap().getAllVariables().map(v=>g.getVariableName(v.getId()));const defs=varNames.map(n=>`var ${n}=0;`).join(';');const src=`var __chaserLastAction=null;var __chaserTurn=0;${defs};${code};return {onStart:typeof onStart==='function'?onStart:null,onTurn:typeof onTurn==='function'?onTurn:null};`;return new Function(src)()}
function runOneFromButton(s){ensureRunningFromButton(s);runTurn();drawRuntime()}
function runTurn(){if(!st.play||st.play.status!=='running')return;if(!st.bot)st.bot=compileBot();try{st.play.pending=null;const api=makeApi();if(!st.bot.onTurn){fail('毎ターンブロックがありません');return}st.bot.onTurn(api);applyPending()}catch(e){fail(`Blockly実行エラー: ${e.message}`)}}
function applyPending(){const p=st.play,a=p.pending;p.turn++;if(!a){p.logs.push(`${p.turn}: actionなし`);judge();return}if(a.kind==='look'||a.kind==='search'){p.logs.push(`${p.turn}: ${a.kind}${a.dir}`);judge();return}if(a.kind==='walk'){const d=delta(a.dir),x=p.cool.x+d.x,y=p.cool.y+d.y;if(tileAt(p,x,y)===2){fail(`壁: walk${a.dir}`);return}p.cool={x,y};if(p.tiles[y][x]==='I'){p.items++;p.tiles[y][x]='.';p.logs.push(`${p.turn}: walk${a.dir} / item +1`)}else p.logs.push(`${p.turn}: walk${a.dir}`);judge();return}if(a.kind==='put'){const d=delta(a.dir),x=p.cool.x+d.x,y=p.cool.y+d.y;if(p.hot&&p.hot.x===x&&p.hot.y===y){p.status='success';p.msg='put成功';p.logs.push(`${p.turn}: put${a.dir} / win`);return}if(y>=0&&y<p.tiles.length&&x>=0&&x<p.tiles[y].length&&p.tiles[y][x]==='.'){p.tiles[y][x]='#'}p.logs.push(`${p.turn}: put${a.dir}`);judge();return}}
function fail(m){st.play.status='failed';st.play.msg=m;st.play.logs.push(`失敗: ${m}`)}
function remain(p){return p.tiles.reduce((a,r)=>a+r.filter(c=>c==='I').length,0)}
function judge(){const p=st.play,v=p.validation;if(v.kind==='reachGoal'&&p.goal&&p.cool.x===p.goal.x&&p.cool.y===p.goal.y){if(v.requireAllItems&&remain(p)>0){fail('アイテム未回収');return}p.status='success';p.msg='ゴール到達';p.logs.push('成功: ゴール到達');return}if(v.kind==='collectItems'&&p.items>=v.minItems){p.status='success';p.msg='アイテム条件達成';return}if(v.kind==='survive'&&p.turn>=v.minTurns){p.status='success';p.msg='生存条件達成';return}if(v.maxActions&&p.turn>=v.maxActions)fail(`最大${v.maxActions}手を超過`)}
function startAuto(s){stopAuto();ensureRunningFromButton(s);drawRuntime();st.timer=setInterval(()=>{if(!st.play||st.play.status!=='running'){stopAuto();drawRuntime();return}runTurn();drawRuntime()},350)}
function stopAuto(){if(st.timer){clearInterval(st.timer);st.timer=null}}
function drawRuntime(){drawBoard();drawStatus();drawLog()}
function drawBoard(){const p=st.play,w=Math.max(...p.tiles.map(r=>r.length));let h=`<div class=map style='grid-template-columns:repeat(${w},28px)'>`;p.tiles.forEach((r,y)=>{for(let x=0;x<w;x++){let ch=r[x]||'#',show=ch;if(p.goal&&p.goal.x===x&&p.goal.y===y){ch='G';show='G'}if(p.hot&&p.hot.x===x&&p.hot.y===y){ch='H';show='H'}if(p.cool.x===x&&p.cool.y===y){ch='C';show='C'}h+=`<div class='cell ${CLS[ch]||'floor'}'>${show==='.'||show==='#'?'':show}</div>`}});document.getElementById('board').innerHTML=h+'</div>'}
function drawStatus(){const p=st.play;document.getElementById('status').innerHTML=`<div class='status ${p.status}'>${esc(p.status)} · ${esc(p.msg)}<br>turn:${p.turn} items:${p.items} pos:(${p.cool.x},${p.cool.y})</div>`}
function drawLog(){document.getElementById('log').textContent=st.play.logs.join(String.fromCharCode(10))}
function renderSolution(s){document.getElementById('body').innerHTML=`<div class=grid><div class=panel><div class=field><label>画像アップロード</label><input type=file id=sol-file accept='image/png,image/jpeg,image/webp'></div><div class=field><label>メモ</label><textarea id=sol-note>${esc(s.solution.note)}</textarea></div><button class='btn danger' id=sol-del>画像を削除</button></div><div class=panel>${solutionImg(s)}</div></div>`;document.getElementById('sol-file').onchange=e=>uploadSolution(s,e.target.files[0]);bind('sol-note',v=>{s.solution.note=v;s.solution.updatedAt=new Date().toISOString()});document.getElementById('sol-del').onclick=()=>{s.solution.imageDataUrl='';s.solution.imageName='';s.solution.imageMimeType='';s.solution.updatedAt=new Date().toISOString();saveLocal();renderSolution(s)}}
function uploadSolution(s,f){if(!f)return;if(!['image/png','image/jpeg','image/webp'].includes(f.type)){msg('画像形式が違います');return}if(f.size>3*1024*1024){msg('3MB以下にしてください');return}const r=new FileReader();r.onload=()=>{s.solution.imageDataUrl=String(r.result);s.solution.imageName=f.name;s.solution.imageMimeType=f.type;s.solution.updatedAt=new Date().toISOString();saveLocal();renderSolution(s);msg('保存しました')};r.readAsDataURL(f)}
function solutionImg(s){const x=s.solution;if(!x.imageDataUrl)return '<div class=empty>模範解答画像は未登録です</div>';return `<div class=preview-img><img src='${x.imageDataUrl}' alt='模範解答'><div class=hint>${esc(x.imageName)} ${esc(x.note)}</div></div>`}
function renderPreview(s){document.getElementById('body').innerHTML=`<div class=panel><h2>${String(s.no).padStart(2,'0')} ${esc(s.title)}</h2><p class='hint mono'>${esc(s.id)}</p><p><b>${esc(s.blockSet)}</b> / ${esc(s.cond)}</p><p>${esc(s.goal)}</p><pre class=mono>${esc(s.rule)}</pre>${s.maps.map(mapView).join('')}<div class=section>模範解答</div>${solutionImg(s)}</div>`}
function mapView(m){const w=Math.max(...m.rows.map(r=>r.length));let h=`<div><p class=hint><b>${esc(m.label)}</b> ${esc(m.note)}</p><div class=map style='grid-template-columns:repeat(${w},28px)'>`;m.rows.forEach(r=>{for(let x=0;x<w;x++){const ch=r[x]||'#';h+=`<div class='cell ${CLS[ch]||'floor'}'>${ch==='.'||ch==='#'?'':ch}</div>`}});return h+'</div></div>'}
function saveJson(){saveXml();download(JSON.stringify({version:2,phases:st.phases},null,2),`chaiser-stages-v2-${new Date().toISOString().slice(0,10)}.json`,'application/json')}
function exportReview(){saveXml();download(reviewHtml(st.phases),'stage_review_next.html','text/html')}
function download(text,name,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function reviewHtml(phases){const data=JSON.stringify(phases).replace(/<\/script/gi,'<\/script');return `<!doctype html><html lang='ja'><meta charset='utf-8'><title>CHaser Review</title><body><pre id=out></pre><script>document.getElementById('out').textContent=JSON.stringify(${data},null,2)<\/script></body></html>`}
document.getElementById('load-default').onclick=loadDefault;document.getElementById('load-json').onclick=()=>document.getElementById('json-file').click();document.getElementById('json-file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{loadObj(JSON.parse(r.result));msg('JSONを読み込みました')}catch(e){msg('読込失敗')}};r.readAsText(f);e.target.value=''};document.getElementById('save-json').onclick=saveJson;document.getElementById('export-review').onclick=exportReview;document.getElementById('clear-local').onclick=()=>{localStorage.removeItem(STORAGE);st.phases=[];disposeBlockly();render()};if(!loadLocal())render();
</script>
