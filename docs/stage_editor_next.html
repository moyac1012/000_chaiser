<header class='head'><b>CH<span>aser</span></b><small>Stage Editor Blockly</small><div class='right'><button class='btn' id='load-default'>既定JSON読込</button><button class='btn' id='load-json'>JSON読込</button><input type='file' id='json-file' accept='.json,application/json' hidden><button class='btn' id='save-json'>JSON保存</button><button class='btn primary' id='export-review'>レビューHTML書き出し</button><button class='btn danger' id='clear-local'>ローカル破棄</button></div></header>

<script>
const STORAGE='chaiserStageBlockly';
const DEFAULT_JSON='../json/chaiser-stages-2026-05-15%20(8).json';
const TABS=[['edit','編集'],['play','Blockly実行'],['solution','模範解答'],['preview','プレビュー']];
const SETS=['BASIC','CHECK','STATE','LOOK','SEARCH','ENEMY','COUNT'];
const PAL=['#','.','I','C','H','G'];
const CLS={'#':'wall','.':'floor',' ':'floor',I:'item',C:'cool',H:'hot',G:'goal'};
const COLOR_ACTION='#f97316',COLOR_ON_TURN='#2563eb',COLOR_VIEW='#06b6d4',COLOR_STATE='#22c55e';
const DIRS=[['→ 右','Right'],['← 左','Left'],['↑ 上','Up'],['↓ 下','Down']];
const DIRS_UDLR=[['↑ 上','Up'],['↓ 下','Down'],['← 左','Left'],['→ 右','Right']];
const TILE_OPTIONS=[['床 (0)','0'],['プレイヤー (1)','1'],['ブロック (2)','2'],['アイテム (3)','3']];
const AROUND_INDEX={Up:1,Down:7,Left:3,Right:5};
const BLOCK_SET_ALLOWED={BASIC:['chaser_on_turn','chaser_action_walk','chaser_turn_end'],CHECK:['chaser_on_turn','chaser_action_walk','chaser_turn_end','chaser_get_tile','chaser_is_tile','chaser_tile_value','controls_if','logic_compare','logic_operation','logic_boolean','logic_negate'],STATE:['chaser_on_turn','chaser_action_walk','chaser_turn_end','chaser_get_tile','chaser_is_tile','chaser_tile_value','chaser_state_create','chaser_state_set','chaser_state_get','chaser_state_change','chaser_turn_number','chaser_last_direction','chaser_direction_value','controls_if','logic_compare','logic_operation','logic_boolean','logic_negate','math_number','math_arithmetic','math_modulo','math_number_property','math_random_int','math_random_float'],LOOK:['chaser_on_turn','chaser_action_walk','chaser_action_look','chaser_action_look_store','chaser_turn_end','chaser_get_tile','chaser_is_tile','chaser_get_around','chaser_view_get_around','chaser_view_has_tile','chaser_discard_value','chaser_tile_value','chaser_state_create','chaser_state_set','chaser_state_get','chaser_state_change','chaser_turn_number','chaser_last_direction','chaser_direction_value','controls_if','logic_compare','logic_operation','logic_boolean','logic_negate','math_number','math_arithmetic','math_modulo','math_number_property','math_random_int','math_random_float'],SEARCH:['chaser_on_turn','chaser_action_walk','chaser_action_put','chaser_action_look','chaser_action_search','chaser_action_look_store','chaser_action_search_store','chaser_turn_end','chaser_get_tile','chaser_is_tile','chaser_get_around','chaser_view_get_around','chaser_view_has_tile','chaser_discard_value','chaser_tile_value','chaser_state_create','chaser_state_set','chaser_state_get','chaser_state_change','chaser_turn_number','chaser_last_direction','chaser_direction_value','controls_if','logic_compare','logic_operation','logic_boolean','logic_negate','math_number','math_arithmetic','math_modulo','math_number_property','math_random_int','math_random_float'],ENEMY:['chaser_on_turn','chaser_action_walk','chaser_action_put','chaser_action_walk_last','chaser_action_walk_random','chaser_action_look','chaser_action_search','chaser_action_look_store','chaser_action_search_store','chaser_turn_end','chaser_get_tile','chaser_is_tile','chaser_get_around','chaser_view_get_around','chaser_view_has_tile','chaser_discard_value','chaser_tile_value','chaser_state_create','chaser_state_set','chaser_state_get','chaser_state_change','chaser_turn_number','chaser_last_direction','chaser_direction_value','controls_if','logic_compare','logic_operation','logic_boolean','logic_negate','math_number','math_arithmetic','math_modulo','math_number_property','math_random_int','math_random_float'],COUNT:['chaser_on_turn','chaser_action_walk','chaser_action_put','chaser_action_walk_last','chaser_action_walk_random','chaser_action_look','chaser_action_search','chaser_action_look_store','chaser_action_search_store','chaser_turn_end','chaser_get_tile','chaser_is_tile','chaser_get_around','chaser_view_get_around','chaser_view_has_tile','chaser_view_count_tile','chaser_discard_value','chaser_tile_value','chaser_state_create','chaser_state_set','chaser_state_get','chaser_state_change','chaser_turn_number','chaser_last_direction','chaser_direction_value','controls_if','logic_compare','logic_operation','logic_boolean','logic_negate','math_number','math_arithmetic','math_modulo','math_number_property','math_random_int','math_random_float']};
let st={phases:[],phase:'',idx:0,tab:'edit',map:0,paint:'#',play:null,ws:null,timer:null,bot:null};
window.st=st;
let blocksReady=false;
const escMap={'&':'&amp;','<':'&lt;','>':'&gt;'};
function esc(v){return String(v??'').replace(/[&<>']/g,c=>c===String.fromCharCode(39)?'&#39;':escMap[c]);}
function msg(t){const e=document.getElementById('toast');e.textContent=t;e.className='toast show';setTimeout(()=>e.className='toast',1800);}
function deepClone(o){return JSON.parse(JSON.stringify(o));}
function saveLocal(){localStorage.setItem(STORAGE,JSON.stringify({version:2,phases:st.phases}));}
function loadLocal(){try{const raw=localStorage.getItem(STORAGE);if(!raw)return false;loadObj(JSON.parse(raw));return true}catch(e){return false}}
function curPhase(){return st.phases.find(p=>p.id===st.phase)||st.phases[0]||null}
function curStage(){const p=curPhase();return p?p.stages[st.idx]||p.stages[0]||null:null}
function normalize(obj){const ps=Array.isArray(obj?.phases)?obj.phases:[];ps.forEach((p,pi)=>{p.id||=String.fromCharCode(65+pi);p.name||='無題グループ';p.color||='#64748b';p.stages||=[];p.stages.forEach((s,i)=>normStage(s,i+1))});return ps}
function normStage(s,no){s.no=Number(s.no||no);s.id||=`step-${String(s.no).padStart(2,'0')}-new`;s.title||='無題ステージ';s.blockSet||='BASIC';s.cond||='goal';s.goal||='';s.rule||='';s.maps=normMaps(s.maps);s.variants=s.maps.length;s.play||={};s.play.validation||=infer(s.cond);s.play.savedBlocklyXml||='';s.solution||={};s.solution.imageDataUrl||='';s.solution.imageName||='';s.solution.imageMimeType||='';s.solution.note||='';s.solution.updatedAt||=''}
function normMaps(ms){if(!Array.isArray(ms)||!ms.length)return[makeBlankMap(7,7)];return ms.map((m,i)=>({label:m.label||`マップ ${String.fromCharCode(65+i)}`,rows:Array.isArray(m.rows)&&m.rows.length?m.rows:['#####','#C.G#','#####'],note:m.note||''}))}
function num(t){const m=String(t||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).match(/\d+/);return m?Number(m[0]):undefined}
function infer(cond){const c=String(cond||'').toLowerCase(),n=num(c);if(c.includes('survive'))return{kind:'survive',minTurns:n||10,maxActions:n};if(c.includes('put'))return{kind:'winByPut',maxActions:n};if(c.includes('items')&&!c.includes('goal'))return{kind:'collectItems',minItems:n||1,maxActions:n};return{kind:'reachGoal',maxActions:n,requireAllItems:c.includes('items')||c.includes('goal+items')}}
function loadObj(obj){disposeBlockly();st.phases=normalize(obj);st.phase=st.phases[0]?.id||'';st.idx=0;st.map=0;st.play=null;st.bot=null;saveLocal();render()}
async function loadDefault(){try{const r=await fetch(DEFAULT_JSON,{cache:'no-store'});if(!r.ok)throw Error(r.status);loadObj(await r.json());msg('既定JSONを読み込みました')}catch(e){msg('既定JSON読込に失敗しました')}}
function render(){renderSide();renderMain()}
function renderSide(){const side=document.getElementById('side');if(!st.phases.length){side.innerHTML='<div class=empty>JSONを読み込んでください</div>';return}let h='<div class=section>グループ／ステージ</div>';st.phases.forEach(p=>{h+=`<div class=phase><div class=ph data-act=edit-phase data-ph='${esc(p.id)}'><span class=ph-title>${esc(p.id)} · ${esc(p.name)}</span><span class=ph-count>${p.stages.length}</span><span class=ph-actions><button class=side-mini data-act=edit-phase data-ph='${esc(p.id)}' title='グループ編集'>E</button></span></div>`;p.stages.forEach((s,i)=>{h+=`<div class='st ${p.id===st.phase&&i===st.idx?'active':''}' data-act=sel data-ph='${esc(p.id)}' data-i='${i}'><span class=st-no>${String(s.no).padStart(2,'0')}</span><span class=st-title>${esc(s.title)}</span><span class=st-actions><button class=side-mini data-act=move-up data-ph='${esc(p.id)}' data-i='${i}' title='上へ'>▲</button><button class=side-mini data-act=move-down data-ph='${esc(p.id)}' data-i='${i}' title='下へ'>▼</button><button class=side-mini data-act=copy-stage data-ph='${esc(p.id)}' data-i='${i}' title='複製'>C</button><button class=side-mini data-act=delete-stage data-ph='${esc(p.id)}' data-i='${i}' title='削除'>×</button></span></div>`});h+=`<button class=side-add data-act=add-stage data-ph='${esc(p.id)}'>＋ ステージ追加</button></div>`});h+='<button class=side-add data-act=add-phase>＋ グループ追加</button>';side.innerHTML=h;side.querySelectorAll('[data-act]').forEach(e=>e.onclick=ev=>{ev.stopPropagation();handleSideAction(e.dataset)})}
function handleSideAction(d){if(d.act==='sel'){selectStage(d.ph,Number(d.i));return}if(d.act==='add-stage'){addStage(d.ph);return}if(d.act==='copy-stage'){copyStage(d.ph,Number(d.i));return}if(d.act==='delete-stage'){deleteStage(d.ph,Number(d.i));return}if(d.act==='move-up'){moveStage(d.ph,Number(d.i),-1);return}if(d.act==='move-down'){moveStage(d.ph,Number(d.i),1);return}if(d.act==='add-phase'){addPhase();return}if(d.act==='edit-phase'){editPhase(d.ph);return}}
function selectStage(phId,idx){disposeBlockly();st.phase=phId;st.idx=idx;st.map=0;st.play=null;st.bot=null;render()}
function makeBlankMap(cols,rows){const arr=[];for(let y=0;y<rows;y++){let line='';for(let x=0;x<cols;x++)line+=y===0||y===rows-1||x===0||x===cols-1?'#':'.';arr.push(line)}if(rows>=4&&cols>=4){arr[1]=setChar(arr[1],1,'G');arr[rows-2]=setChar(arr[rows-2],cols-2,'C')}return{label:'マップ A',rows:arr,note:''}}
function setChar(s,i,ch){return s.slice(0,i)+ch+s.slice(i+1)}
function makeNewStage(){return{no:0,id:'step-00-new',title:'新規ステージ',blockSet:'BASIC',variants:1,cond:'goal',goal:'',rule:'',maps:[makeBlankMap(7,7)],play:{validation:infer('goal'),defaultVariantIndex:0,savedBlocklyXml:''},solution:{imageDataUrl:'',imageName:'',imageMimeType:'',note:'',updatedAt:''}}}
function addStage(phId){const p=st.phases.find(x=>x.id===phId);if(!p)return;p.stages.push(makeNewStage());st.phase=phId;st.idx=p.stages.length-1;st.map=0;st.play=null;st.bot=null;renumberAll();saveLocal();render();msg('ステージを追加しました')}
function copyStage(phId,idx){const p=st.phases.find(x=>x.id===phId);if(!p||!p.stages[idx])return;const copy=deepClone(p.stages[idx]);const m=(copy.id||'').match(/^step-\d+-(.+)$/);const base=m?m[1]:(copy.id||'new');const slugs=new Set(st.phases.flatMap(ph=>ph.stages).map(s=>{const sm=(s.id||'').match(/^step-\d+-(.+)$/);return sm?sm[1]:(s.id||'')}));let slug=base+'-copy',n=2;while(slugs.has(slug)){slug=base+'-copy-'+n;n++}copy.id='step-00-'+slug;copy.title=(copy.title||'無題')+'（コピー）';p.stages.splice(idx+1,0,copy);st.phase=phId;st.idx=idx+1;st.map=0;st.play=null;st.bot=null;renumberAll();saveLocal();render();msg('ステージを複製しました')}
function deleteStage(phId,idx){const p=st.phases.find(x=>x.id===phId);if(!p||!p.stages[idx])return;if(!confirm(`「${p.stages[idx].title||'無題ステージ'}」を削除しますか？`))return;p.stages.splice(idx,1);if(p.stages.length===0)p.stages.push(makeNewStage());st.phase=phId;st.idx=Math.min(idx,p.stages.length-1);st.map=0;st.play=null;st.bot=null;renumberAll();saveLocal();render();msg('ステージを削除しました')}
function moveStage(phId,idx,dir){const phIdx=st.phases.findIndex(p=>p.id===phId);if(phIdx<0)return;const p=st.phases[phIdx];if(idx<0||idx>=p.stages.length)return;const selected=curStage();const target=p.stages[idx];if(dir<0){if(idx>0){p.stages.splice(idx,1);p.stages.splice(idx-1,0,target)}else if(phIdx>0){p.stages.splice(idx,1);st.phases[phIdx-1].stages.push(target)}else return}else{if(idx<p.stages.length-1){p.stages.splice(idx,1);p.stages.splice(idx+1,0,target)}else if(phIdx<st.phases.length-1){p.stages.splice(idx,1);st.phases[phIdx+1].stages.unshift(target)}else return}if(selected)selectByStageRef(selected);renumberAll();saveLocal();render()}
function selectByStageRef(ref){for(const p of st.phases){const i=p.stages.indexOf(ref);if(i>=0){st.phase=p.id;st.idx=i;return}}st.phase=st.phases[0]?.id||'';st.idx=0}
function renumberAll(){let c=1;st.phases.forEach(p=>p.stages.forEach(s=>{s.no=c;const m=(s.id||'').match(/^step-\d+-(.+)$/);if(m)s.id=`step-${String(c).padStart(2,'0')}-${m[1]}`;c++}))}
function addPhase(){let id=prompt('新しいグループIDを入力してください（例: I）','');if(!id)return;id=id.trim();if(!id)return;if(st.phases.some(p=>p.id===id)){alert('同じIDのグループが既にあります');return}const name=prompt('グループ名を入力してください','新規グループ')||'新規グループ';st.phases.push({id,name,color:'#64748b',bg:'#f1f5f9',stages:[makeNewStage()]});st.phase=id;st.idx=0;renumberAll();saveLocal();render();msg('グループを追加しました')}
function editPhase(phId){const p=st.phases.find(x=>x.id===phId);if(!p)return;const name=prompt('グループ名を変更します',p.name||'');if(name==null)return;p.name=name.trim()||p.name;saveLocal();render();msg('グループを更新しました')}
function renderMain(){const s=curStage(),main=document.getElementById('main');if(!s){main.innerHTML='<div class=empty>JSONを読み込んでください</div>';return}main.innerHTML=`<div class=tabs>${TABS.map(([id,l])=>`<div class='tab ${st.tab===id?'active':''}' data-tab='${id}'>${l}</div>`).join('')}</div><div id=body></div>`;main.querySelectorAll('.tab').forEach(e=>e.onclick=()=>{if(st.tab==='play')saveXml();disposeBlockly();st.tab=e.dataset.tab;renderMain()});if(st.tab==='edit')renderEdit(s);if(st.tab==='play')renderPlay(s);if(st.tab==='solution')renderSolution(s);if(st.tab==='preview')renderPreview(s)}
function bind(id,fn){const e=document.getElementById(id);e.oninput=()=>{fn(e.value);saveLocal()};e.onchange=e.oninput}
function renderEdit(s){const b=document.getElementById('body'),m=s.maps[st.map]||s.maps[0];b.innerHTML=`<div class=grid><div class=field><label>ID</label><input id=f-id class=mono value='${esc(s.id)}'></div><div class=field><label>タイトル</label><input id=f-title value='${esc(s.title)}'></div><div class=field><label>ブロックセット</label><select id=f-set>${SETS.map(x=>`<option ${x===s.blockSet?'selected':''}>${x}</option>`)}</select></div><div class=field><label>クリア条件</label><input id=f-cond value='${esc(s.cond)}'></div></div><div class=field><label>学習目標</label><textarea id=f-goal>${esc(s.goal)}</textarea></div><div class=field><label>反応型ルール</label><textarea id=f-rule class=mono>${esc(s.rule)}</textarea></div><div class=section>マップ編集</div><div class=field><label>対象マップ</label><select id=map-sel>${s.maps.map((x,i)=>`<option value='${i}' ${i===st.map?'selected':''}>${esc(x.label)}</option>`)}</select></div><div class=grid><div class=field><label>マップ名</label><input id=f-map-label value='${esc(m.label)}'></div><div class=field><label>マップ注記</label><input id=f-map-note value='${esc(m.note)}'></div></div><div>${PAL.map(ch=>`<button class='pal ${CLS[ch]} ${st.paint===ch?'active':''}' data-paint='${ch}'>${ch==='.'||ch==='#'?'':ch}</button>`).join('')}</div><div id=edit-map></div><div class=field><label>ASCIIマップ</label><textarea id=f-rows class=mono>${esc(m.rows.join(String.fromCharCode(10)))}</textarea><div class=hint>グリッドをマウスでドラッグして塗れます。ASCIIも直接編集できます。</div></div>`;bind('f-id',v=>s.id=v);bind('f-title',v=>{s.title=v;renderSide()});bind('f-set',v=>{s.blockSet=v;st.bot=null});bind('f-cond',v=>{s.cond=v;s.play.validation=infer(v)});bind('f-goal',v=>s.goal=v);bind('f-rule',v=>s.rule=v);document.getElementById('map-sel').onchange=e=>{st.map=Number(e.target.value);st.play=null;st.bot=null;renderMain()};bind('f-map-label',v=>m.label=v);bind('f-map-note',v=>m.note=v);bind('f-rows',v=>{m.rows=v.replace(new RegExp(String.fromCharCode(13),'g'),'').split(String.fromCharCode(10)).filter(Boolean);st.play=null;st.bot=null;drawEditMap(m)});document.querySelectorAll('.pal').forEach(e=>e.onclick=()=>{st.paint=e.dataset.paint;document.querySelectorAll('.pal').forEach(x=>x.classList.toggle('active',x.dataset.paint===st.paint))});drawEditMap(m)}
function drawEditMap(m){const w=Math.max(...m.rows.map(r=>r.length)),el=document.getElementById('edit-map');let h=`<div class='map edit' style='grid-template-columns:repeat(${w},28px)'>`;m.rows.forEach((r,y)=>{for(let x=0;x<w;x++){const ch=r[x]||'#';h+=`<div class='cell ${CLS[ch]||'floor'}' data-x='${x}' data-y='${y}'>${ch==='.'||ch==='#'?'':ch}</div>`}});h+='</div>';el.innerHTML=h;let down=false;const paint=c=>{const x=Number(c.dataset.x),y=Number(c.dataset.y);m.rows[y]=(m.rows[y]||'').padEnd(w,'#');m.rows[y]=m.rows[y].slice(0,x)+st.paint+m.rows[y].slice(x+1);document.getElementById('f-rows').value=m.rows.join(String.fromCharCode(10));saveLocal();st.play=null;st.bot=null;drawEditMap(m)};el.querySelectorAll('.cell').forEach(c=>{c.onmousedown=e=>{down=true;paint(c);e.preventDefault()};c.onmouseenter=()=>{if(down)paint(c)}});document.onmouseup=()=>down=false}
function registerBlocks(){localizeBlocklyMessages();if(blocksReady||typeof Blockly==='undefined')return;blocksReady=true;Blockly.defineBlocksWithJsonArray(blockJson());registerGenerators()}
function localizeBlocklyMessages(){if(!window.Blockly||!Blockly.Msg)return;Object.assign(Blockly.Msg,{CONTROLS_IF_MSG_IF:'もし',CONTROLS_IF_MSG_ELSEIF:'そうでなくもし',CONTROLS_IF_MSG_ELSE:'そうでなければ',CONTROLS_IF_IF_TITLE_IF:'もし',CONTROLS_IF_ELSEIF_TITLE_ELSEIF:'そうでなくもし',CONTROLS_IF_ELSE_TITLE_ELSE:'そうでなければ',LOGIC_OPERATION_AND:'かつ',LOGIC_OPERATION_OR:'または',LOGIC_NEGATE_TITLE:'%1 ではない',LOGIC_BOOLEAN_TRUE:'真',LOGIC_BOOLEAN_FALSE:'偽',LOGIC_NULL:'なし',MATH_MODULO_TITLE:'%1 を %2 で割った余り',MATH_RANDOM_INT_TITLE:'%1 から %2 までのランダムな整数',MATH_RANDOM_FLOAT_TITLE_RANDOM:'0以上1未満のランダムな小数',MATH_IS_EVEN:'偶数',MATH_IS_ODD:'奇数',MATH_IS_PRIME:'素数',MATH_IS_WHOLE:'整数',MATH_IS_POSITIVE:'正の数',MATH_IS_NEGATIVE:'負の数',MATH_IS_DIVISIBLE_BY:'割り切れる',VARIABLES_DEFAULT_NAME:'変数',NEW_VARIABLE:'変数を作成',RENAME_VARIABLE:'変数名を変更',DELETE_VARIABLE:'変数を削除'});}
function blockJson(){return[]}
function gen(){return window.javascript?.javascriptGenerator||Blockly.JavaScript}
window.gen=gen;
function registerGenerators(){}
function toolbox(set){return filterToolbox(fullToolbox(),new Set(BLOCK_SET_ALLOWED[set]||BLOCK_SET_ALLOWED.BASIC))}
function fullToolbox(){return{kind:'categoryToolbox',contents:[]}}
function filterToolbox(tb,allowed){return tb}
function defaultXml(){return `<xml xmlns='https://developers.google.com/blockly/xml'></xml>`}
function disposeBlockly(){if(st.ws){saveXml();st.ws.dispose();st.ws=null}stopAuto()}
function renderPlay(s){const b=document.getElementById('body');if(!st.play)st.play=initPlay(s,st.map);b.innerHTML=`<div class=play><div class=panel><div class=field><label>対象マップ</label><select id=play-map>${s.maps.map((m,i)=>`<option value='${i}' ${i===st.map?'selected':''}>${esc(m.label)}</option>`)}</select></div><div class=hint>現在のブロックセット: <b>${esc(s.blockSet)}</b></div><div id=board></div><div id=status></div><div class=controls><button class='btn primary' id=one>1ターン実行</button><button class=btn id=auto>自動実行</button><button class='btn warn' id=stop>停止</button><button class='btn warn' id=reset>リセット</button><button class=btn id=xml-save>Blockly保存</button></div><div class=section>実行ログ</div><pre class=log id=log></pre></div><div><div class=hint>実行ボタンは、失敗・成功後なら初期状態に戻して、現在のBlocklyプログラムを再コンパイルしてから実行します。</div><div class=blockly id=blockly></div></div></div>`;document.getElementById('play-map').onchange=e=>{saveXml();st.map=Number(e.target.value);st.play=initPlay(s,st.map);st.bot=null;drawRuntime()};document.getElementById('one').onclick=()=>{runOneFromButton(s)};document.getElementById('auto').onclick=()=>startAuto(s);document.getElementById('stop').onclick=stopAuto;document.getElementById('reset').onclick=()=>{resetRuntime(s);drawRuntime()};document.getElementById('xml-save').onclick=()=>{saveXml();msg('Blockly XMLを保存しました')};drawRuntime();initBlockly(s)}
function initBlockly(s){registerBlocks();st.ws=Blockly.inject('blockly',{toolbox:toolbox(s.blockSet),trashcan:true,scrollbars:true});st.ws.registerButtonCallback('CREATE_VAR',()=>Blockly.Variables.createVariableButtonHandler(st.ws));try{Blockly.Xml.domToWorkspace(Blockly.utils.xml.textToDom(s.play.savedBlocklyXml||defaultXml()),st.ws)}catch(e){Blockly.Xml.domToWorkspace(Blockly.utils.xml.textToDom(defaultXml()),st.ws)}st.ws.addChangeListener(()=>{st.bot=null})}
function saveXml(){const s=curStage();if(s&&st.ws){s.play.savedBlocklyXml=Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(st.ws));saveLocal()}}
window.saveXml=saveXml;
function initPlay(s,i){const m=s.maps[i]||s.maps[0],p=parseMap(m.rows);return{tiles:p.tiles,cool:p.cool,hot:p.hot,goal:p.goal,turn:0,items:0,status:'running',msg:'Blockly実行待機中',logs:[`map: ${m.label}`],validation:s.play.validation||infer(s.cond),pending:null,lastDir:'Up'}}
window.initPlay=initPlay;
function resetRuntime(s){saveXml();st.play=initPlay(s,st.map);st.bot=null}
function ensureRunningFromButton(s){if(!st.play||st.play.status!=='running'||!st.bot){resetRuntime(s)}}
window.ensureRunningFromButton=ensureRunningFromButton;
function parseMap(rows){let cool=null,hot=null,goal=null;const tiles=rows.map((r,y)=>[...r].map((ch,x)=>{if(ch==='C'){cool={x,y};return'.'}if(ch==='H'){hot={x,y};return'.'}if(ch==='G'){goal={x,y};return'.'}return ch}));return{tiles,cool:cool||{x:1,y:1},hot,goal}}
function runOneFromButton(s){ensureRunningFromButton(s);drawRuntime()}
function startAuto(s){stopAuto();ensureRunningFromButton(s);drawRuntime()}
function stopAuto(){if(st.timer){clearInterval(st.timer);st.timer=null}}
window.stopAuto=stopAuto;
function drawRuntime(){drawBoard();drawStatus();drawLog()}
window.drawRuntime=drawRuntime;
function drawBoard(){const p=st.play,w=Math.max(...p.tiles.map(r=>r.length));let h=`<div class=map style='grid-template-columns:repeat(${w},28px)'>`;p.tiles.forEach((r,y)=>{for(let x=0;x<w;x++){let ch=r[x]||'#',show=ch;if(p.goal&&p.goal.x===x&&p.goal.y===y){ch='G';show='G'}if(p.hot&&p.hot.x===x&&p.hot.y===y){ch='H';show='H'}if(p.cool.x===x&&p.cool.y===y){ch='C';show='C'}h+=`<div class='cell ${CLS[ch]||'floor'}'>${show==='.'||show==='#'?'':show}</div>`}});document.getElementById('board').innerHTML=h+'</div>'}
function drawStatus(){const p=st.play;document.getElementById('status').innerHTML=`<div class='status ${p.status}'>${esc(p.status)} · ${esc(p.msg)}<br>turn:${p.turn} items:${p.items} pos:(${p.cool.x},${p.cool.y})</div>`}
function drawLog(){document.getElementById('log').textContent=st.play.logs.join(String.fromCharCode(10))}
function renderSolution(s){document.getElementById('body').innerHTML=`<div class=grid><div class=panel><div class=field><label>画像アップロード</label><input type=file id=sol-file accept='image/png,image/jpeg,image/webp'></div><div class=field><label>メモ</label><textarea id=sol-note>${esc(s.solution.note)}</textarea></div><button class='btn danger' id=sol-del>画像を削除</button></div><div class=panel>${solutionImg(s)}</div></div>`;document.getElementById('sol-file').onchange=e=>uploadSolution(s,e.target.files[0]);bind('sol-note',v=>{s.solution.note=v;s.solution.updatedAt=new Date().toISOString()});document.getElementById('sol-del').onclick=()=>{s.solution.imageDataUrl='';s.solution.imageName='';s.solution.imageMimeType='';s.solution.updatedAt=new Date().toISOString();saveLocal();renderSolution(s)}}
function uploadSolution(s,f){if(!f)return;if(!['image/png','image/jpeg','image/webp'].includes(f.type)){msg('画像形式が違います');return}if(f.size>3*1024*1024){msg('3MB以下にしてください');return}const r=new FileReader();r.onload=()=>{s.solution.imageDataUrl=String(r.result);s.solution.imageName=f.name;s.solution.imageMimeType=f.type;s.solution.updatedAt=new Date().toISOString();saveLocal();renderSolution(s);msg('保存しました')};r.readAsDataURL(f)}
function solutionImg(s){const x=s.solution;if(!x.imageDataUrl)return '<div class=empty>模範解答画像は未登録です</div>';return `<div class=preview-img><img src='${x.imageDataUrl}' alt='模範解答'><div class=hint>${esc(x.imageName)} ${esc(x.note)}</div></div>`}
function renderPreview(s){document.getElementById('body').innerHTML=`<div class=panel><h2>${String(s.no).padStart(2,'0')} ${esc(s.title)}</h2><p class='hint mono'>${esc(s.id)}</p><p><b>${esc(s.blockSet)}</b> / ${esc(s.cond)}</p><p>${esc(s.goal)}</p><pre class=mono>${esc(s.rule)}</pre>${s.maps.map(mapView).join('')}<div class=section>模範解答</div>${solutionImg(s)}</div>`}
function mapView(m){const w=Math.max(...m.rows.map(r=>r.length));let h=`<div><p class=hint><b>${esc(m.label)}</b> ${esc(m.note)}</p><div class=map style='grid-template-columns:repeat(${w},28px)'>`;m.rows.forEach(r=>{for(let x=0;x<w;x++){const ch=r[x]||'#';h+=`<div class='cell ${CLS[ch]||'floor'}'>${ch==='.'||ch==='#'?'':ch}</div>`}});return h+'</div></div>'}
function saveJson(){saveXml();download(JSON.stringify({version:2,phases:st.phases},null,2),`chaiser-stages-v2-${new Date().toISOString().slice(0,10)}.json`,'application/json')}
function exportReview(){saveXml();download(reviewHtml(st.phases),'stage_review_next.html','text/html')}
function download(text,name,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function reviewHtml(phases){const data=JSON.stringify(phases).replace(/<\/script/gi,'<\/script');return `<!doctype html><html lang='ja'><meta charset='utf-8'><title>CHaser Review</title><body><pre id=out></pre><script>document.getElementById('out').textContent=JSON.stringify(${data},null,2)<\/script></body></html>`}
document.getElementById('load-default').onclick=loadDefault;document.getElementById('load-json').onclick=()=>document.getElementById('json-file').click();document.getElementById('json-file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{loadObj(JSON.parse(r.result));msg('JSONを読み込みました')}catch(e){msg('読込失敗')}};r.readAsText(f);e.target.value=''};document.getElementById('save-json').onclick=saveJson;document.getElementById('export-review').onclick=exportReview;document.getElementById('clear-local').onclick=()=>{localStorage.removeItem(STORAGE);st.phases=[];disposeBlockly();render()};if(!loadLocal())render();
</script>
<script src='./stage_editor_next_runtime.js'></script>
</body>
</html>
