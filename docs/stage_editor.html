<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHaser ステージエディタ</title>
<style>
:root {
  --cool: #38bdf8;
  --hot:  #fb7185;
  --ink:  #0f172a;
  --ink-soft: #334155;
  --panel: rgba(255,255,255,0.92);
  --panel-strong: rgba(255,255,255,0.97);
  --border: rgba(15,23,42,0.12);
  --font-ui: "Space Grotesk", system-ui, sans-serif;
  --font-display: "Oxanium", "Space Grotesk", system-ui, sans-serif;

  --ph-A: #64748b; --ph-A-bg: #f1f5f9;
  --ph-B: #0ea5e9; --ph-B-bg: #e0f2fe;
  --ph-C: #8b5cf6; --ph-C-bg: #ede9fe;
  --ph-D: #f59e0b; --ph-D-bg: #fef3c7;
  --ph-E: #14b8a6; --ph-E-bg: #ccfbf1;
  --ph-F: #ef4444; --ph-F-bg: #fee2e2;
  --ph-G: #f97316; --ph-G-bg: #ffedd5;
  --ph-H: #a855f7; --ph-H-bg: #f3e8ff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  color: var(--ink);
  background-color: #f8fafc;
  background-image:
    radial-gradient(700px 400px at 8% 12%, rgba(56,189,248,0.18), transparent 65%),
    radial-gradient(680px 380px at 95% -4%, rgba(251,146,60,0.20), transparent 60%),
    radial-gradient(520px 320px at 45% 0%, rgba(94,234,212,0.14), transparent 62%),
    linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px),
    linear-gradient(180deg, #f8fafc 0%, #f1f5f9 55%, #eef2ff 100%);
  background-size: auto,auto,auto,26px 26px,26px 26px,auto;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(120deg,#0f172a 0%,#1e293b 55%,#0b1020 100%);
  border-bottom: 1px solid rgba(148,163,184,0.2);
  box-shadow: 0 4px 24px rgba(15,23,42,0.25);
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  padding: 10px 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.header-logo {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 800; letter-spacing: 0.08em;
  color: #f8fafc;
}
.header-logo span { color: var(--cool); }
.header-sub {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(148,163,184,0.8); margin-left: 8px;
}
.header-actions { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
.hbtn {
  background: rgba(15,23,42,0.5);
  border: 1px solid rgba(148,163,184,0.3);
  color: #e2e8f0;
  border-radius: 999px;
  padding: 5px 12px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.hbtn:hover { background: rgba(56,189,248,0.2); border-color: var(--cool); color: #fff; }
.hbtn.primary { background: var(--cool); color: #0f172a; border-color: var(--cool); }
.hbtn.primary:hover { background: #7dd3fc; }
.hbtn.danger { color: #fda4af; border-color: rgba(251,113,133,0.4); }
.hbtn.danger:hover { background: rgba(251,113,133,0.2); color: #fff; border-color: var(--hot); }

/* ── LAYOUT ── */
.app {
  max-width: 1600px; margin: 0 auto;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 16px;
  min-height: calc(100vh - 60px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  height: calc(100vh - 92px);
  overflow-y: auto;
  position: sticky; top: 76px;
}
.sb-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: #94a3b8; margin-bottom: 8px;
}
.sb-phase { margin-bottom: 12px; }
.sb-phase-head {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 10px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; user-select: none;
}
.sb-phase-head:hover { background: #f1f5f9; }
.sb-phase-pip {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.sb-phase-label { flex: 1; }
.sb-phase-count {
  font-size: 10px; color: #94a3b8; font-weight: 600;
}
.sb-stages { padding-left: 18px; }
.sb-stage {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  color: var(--ink-soft);
  margin-bottom: 1px;
}
.sb-stage:hover { background: #f1f5f9; }
.sb-stage.active { background: #0f172a; color: #f8fafc; }
.sb-stage-no {
  font-family: var(--font-display);
  font-weight: 800; min-width: 22px;
  font-size: 10px;
}
.sb-stage-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-stage-actions {
  display: flex; gap: 1px; opacity: 0.4; transition: opacity 0.12s; flex-shrink: 0;
}
.sb-stage:hover .sb-stage-actions, .sb-stage.active .sb-stage-actions { opacity: 1; }
.sb-stage-btn {
  width: 18px; height: 18px;
  border: none; background: transparent;
  font-size: 9px; line-height: 1; cursor: pointer;
  border-radius: 4px;
  color: inherit;
  padding: 0;
}
.sb-stage-btn:hover { background: rgba(15,23,42,0.12); }
.sb-stage.active .sb-stage-btn:hover { background: rgba(255,255,255,0.18); }
.sb-add {
  margin-top: 6px;
  font-size: 10px; color: #94a3b8;
  background: none; border: 1px dashed #cbd5e1;
  border-radius: 8px;
  padding: 4px 8px;
  cursor: pointer; width: 100%;
}
.sb-add:hover { color: var(--cool); border-color: var(--cool); }

/* ── EDITOR ── */
.editor {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
}
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 8px 16px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #94a3b8;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink-soft); }
.tab.active { color: var(--cool); border-bottom-color: var(--cool); }

/* ── FORM ── */
.field { margin-bottom: 14px; }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }
.field label {
  display: block;
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: #94a3b8; margin-bottom: 4px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 12px;
  font-family: var(--font-ui);
  background: #fff;
  color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 2px solid var(--cool); outline-offset: -1px; border-color: var(--cool);
}
.field input.mono, .field textarea.mono { font-family: monospace; }
.field textarea { resize: vertical; min-height: 50px; }
.field-display {
  padding: 6px 10px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px; font-family: var(--font-display); font-weight: 800;
  background: #f8fafc;
  color: var(--ink);
  text-align: center;
  letter-spacing: 0.05em;
}
.field-hint {
  font-size: 10px; color: #94a3b8; margin-top: 3px;
}

.section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink); margin: 18px 0 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-title-actions { margin-left: auto; display: flex; gap: 6px; }
.mini-btn {
  background: #fff; border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  cursor: pointer; color: var(--ink-soft);
}
.mini-btn:hover { background: #f1f5f9; border-color: var(--cool); color: var(--cool); }
.mini-btn.danger { color: #b91c1c; border-color: #fca5a5; }
.mini-btn.danger:hover { background: #fee2e2; border-color: #f87171; }

/* ── MAP EDITOR ── */
.map-edit-block {
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  background: #fafbfc;
}
.map-edit-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  flex-wrap: wrap;
}
.map-edit-head input { width: auto; flex: 1; min-width: 140px; }
.size-controls { display: flex; gap: 4px; align-items: center; font-size: 11px; color: #64748b; }
.size-controls input { width: 50px; text-align: center; }
.palette {
  display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; align-items: center;
}
.palette-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: #94a3b8; margin-right: 4px;
}
.pal {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; font-family: monospace;
  transition: transform 0.1s;
}
.pal:hover { transform: scale(1.08); }
.pal.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(56,189,248,0.4); }
.pal-wall  { background: #1e293b; color: #fff; }
.pal-floor { background: #f8fafc; color: #94a3b8; border-color: #e2e8f0; }
.pal-item  { background: #fbbf24; color: #78350f; }
.pal-cool  { background: #38bdf8; color: #0c4a6e; }
.pal-hot   { background: #fb7185; color: #7f1d1d; }
.pal-goal  { background: #34d399; color: #064e3b; }

.map-grid-edit {
  display: inline-grid;
  gap: 1px;
  background: #cbd5e1;
  border: 1px solid #94a3b8;
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 8px;
}
.map-row { display: flex; gap: 1px; }
.cell {
  width: 22px; height: 22px;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; font-family: monospace;
  cursor: pointer;
  transition: filter 0.1s;
}
.cell:hover { filter: brightness(1.15); outline: 1px solid var(--ink); }
.c-wall  { background: #1e293b; color: #fff; }
.c-floor { background: #f8fafc; }
.c-item  { background: #fbbf24; color: #78350f; }
.c-cool  { background: #38bdf8; color: #0c4a6e; }
.c-hot   { background: #fb7185; color: #7f1d1d; }
.c-goal  { background: #34d399; color: #064e3b; }

.ascii-preview {
  font-family: monospace; font-size: 11px;
  color: #64748b; background: #f1f5f9;
  border-radius: 6px; padding: 6px 10px;
  white-space: pre; line-height: 1.4;
}

/* ── PREVIEW ── */
.preview-wrap {
  background: #f1f5f9;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}
.stage-card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
  overflow: hidden;
  max-width: 480px;
}
.card-header {
  padding: 14px 18px 10px;
  display: flex; align-items: flex-start; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.step-num {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
  line-height: 1; min-width: 42px;
  color: var(--ink);
}
.card-title-area { flex: 1; }
.card-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }
.card-id { font-size: 10px; color: #94a3b8; margin-top: 2px; font-family: monospace; }
.phase-pip {
  width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0;
}
.card-badges {
  padding: 8px 18px;
  display: flex; flex-wrap: wrap; gap: 6px;
  border-bottom: 1px solid var(--border);
}
.badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 999px;
  border: 1px solid transparent;
}
.badge--block  { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
.badge--var    { background: #ede9fe; color: #7c3aed; border-color: #c4b5fd; }
.badge--cond   { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
.badge--items  { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
.badge--look   { background: #ccfbf1; color: #0f766e; border-color: #5eead4; }
.badge--put    { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
.badge--enemy  { background: #ffedd5; color: #9a3412; border-color: #fdba74; }
.badge--count  { background: #f3e8ff; color: #7e22ce; border-color: #d8b4fe; }
.badge--goal   { background: #f0fdf4; color: #166534; border-color: #86efac; }
.badge--survive{ background: #fff1f2; color: #9f1239; border-color: #fda4af; }
.badge--ai-r   { background: #fafaf9; color: #57534e; border-color: #a8a29e; }
.badge--ai-p   { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
.badge--new-sys{ background: #fdf4ff; color: #86198f; border-color: #e879f9; }
.card-body { padding: 12px 18px; display: flex; flex-direction: column; gap: 10px; }
.field-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: #94a3b8; margin-bottom: 3px;
}
.field-value { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
.field-mono  { font-family: monospace; font-size: 11px; }
.maps-wrap { display: flex; flex-wrap: wrap; gap: 12px; }
.map-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; }
.map-grid {
  display: inline-grid;
  gap: 1px;
  background: #e2e8f0;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  padding: 4px;
}
.preview-cell {
  width: 16px; height: 16px;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 800; font-family: monospace;
}
.variant-note {
  font-size: 10px; color: #64748b; background: #f8fafc;
  border: 1px dashed #cbd5e1; border-radius: 10px; padding: 6px 10px;
}

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: #0f172a; color: #f8fafc;
  padding: 10px 18px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(15,23,42,0.4);
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: #991b1b; }
.toast.ok { background: #166534; }

.phase-edit-dialog {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.6);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
.phase-edit-dialog.show { display: flex; }
.phase-edit-inner {
  background: #fff; border-radius: 16px;
  padding: 20px; width: 420px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.3);
}
.phase-edit-inner h3 { font-size: 14px; margin-bottom: 14px; }
.phase-edit-actions { display: flex; gap: 8px; margin-top: 14px; }
.phase-edit-actions button { flex: 1; }

.empty {
  padding: 80px 20px;
  text-align: center; color: #94a3b8;
  font-size: 14px;
}

/* ── BLOCK SET MODAL ── */
.bs-modal {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.7);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 20px;
}
.bs-modal.show { display: flex; }
.bs-modal-inner {
  background: #fff;
  border-radius: 20px;
  padding: 22px 26px;
  max-width: 720px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.bs-modal-close {
  position: absolute; top: 14px; right: 16px;
  background: #f1f5f9; border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  cursor: pointer;
  font-size: 18px;
  color: #64748b;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.bs-modal-close:hover { background: #e2e8f0; color: var(--ink); }
.bs-modal-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 800;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.bs-modal-sub {
  font-size: 11px; color: #64748b;
  margin-bottom: 16px;
  line-height: 1.5;
}
.bs-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px;
  margin-bottom: 8px;
  background: #fafbfc;
}
.bs-card-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.bs-card-range { font-size: 10px; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
.bs-card-inherits { font-size: 10px; color: #94a3b8; font-style: italic; }
.bs-card-desc { font-size: 12px; color: #475569; margin-bottom: 7px; line-height: 1.5; }
.bs-card-blocks {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.bs-block-chip {
  font-family: monospace; font-size: 10px;
  background: #fff; color: #475569;
  padding: 3px 8px; border-radius: 6px;
  border: 1px solid #cbd5e1;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <span class="header-logo">CH<span>aser</span></span>
      <span class="header-sub">Stage Editor</span>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="btn-bs">ブロックセット</button>
      <button class="hbtn" id="btn-load">JSON読込</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
      <button class="hbtn" id="btn-save">JSON保存</button>
      <button class="hbtn primary" id="btn-export-html">HTML書き出し</button>
      <button class="hbtn danger" id="btn-reset">リセット</button>
    </div>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <section class="editor" id="editor"></section>
</div>

<div class="phase-edit-dialog" id="phase-dialog">
  <div class="phase-edit-inner">
    <h3 id="phase-dialog-title">グループ編集</h3>
    <div class="field"><label>ID（A〜Z）</label><input type="text" id="ph-id" maxlength="2"></div>
    <div class="field"><label>名前</label><input type="text" id="ph-name"></div>
    <div class="field"><label>範囲（例: 01〜03）</label><input type="text" id="ph-range"></div>
    <div class="field"><label>説明</label><textarea id="ph-desc"></textarea></div>
    <div class="field-row">
      <div class="field"><label>色（線）</label><input type="color" id="ph-color"></div>
      <div class="field"><label>背景</label><input type="color" id="ph-bg"></div>
    </div>
    <div class="phase-edit-actions">
      <button class="hbtn" id="phase-dialog-cancel">キャンセル</button>
      <button class="hbtn primary" id="phase-dialog-ok">保存</button>
    </div>
  </div>
</div>

<div class="bs-modal" id="bs-modal">
  <div class="bs-modal-inner">
    <button class="bs-modal-close" id="bs-modal-close" aria-label="閉じる">×</button>
    <div class="bs-modal-title">ブロックセット一覧</div>
    <div class="bs-modal-sub">各レベルで使えるブロック群。下位のセットは上位を含む（インクルード方式）。</div>
    <div id="bs-modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   BLOCK SETS INFO
══════════════════════════════════════════ */
const BLOCK_SETS_INFO = [
  { name:'BASIC', range:'Step 01〜', cls:'badge--block',
    desc:'毎ターン同じ行動を繰り返す。最小構成。',

function renderBlockSetsModal() {
  return BLOCK_SETS_INFO.map(bs => `
    <div class="bs-card">
      <div class="bs-card-head">
        <span class="badge ${bs.cls}">${bs.name}</span>
        <span class="bs-card-range">${bs.range}</span>
        ${bs.inherits ? `<span class="bs-card-inherits">⊃ ${bs.inherits} のすべて</span>` : ''}
      </div>
      <div class="bs-card-desc">${bs.desc}</div>
      <div class="bs-card-blocks">${bs.blocks.map(b=>`<span class="bs-block-chip">${b}</span>`).join('')}</div>
    </div>`).join('');
}

document.getElementById('btn-bs').addEventListener('click', () => {
  document.getElementById('bs-modal-body').innerHTML = renderBlockSetsModal();
  document.getElementById('bs-modal').classList.add('show');
});
document.getElementById('bs-modal-close').addEventListener('click', () => {
  document.getElementById('bs-modal').classList.remove('show');
});
document.getElementById('bs-modal').addEventListener('click', (e) => {
  if (e.target.id === 'bs-modal') document.getElementById('bs-modal').classList.remove('show');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('bs-modal').classList.remove('show');
});

          {label:'バリアント B（敵が右上）',rows:['#########','#......H#','#.#####.#','#.#...#.#','#.#...#.#','#.#...#.#','#.#####.#','#...C...#','#########'],note:'searchRight最多 → 右上へ接近'},
          {label:'バリアント C（敵が内側）',rows:['#########','#.......#','#.#####.#','#.#.H.#.#','#.#...#.#','#.#...#.#','#.#####.#','#...C...#','#########'],note:'search全方向比較で検出'}]},

];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const STORAGE_KEY = 'chaiserStageEditor';
const PALETTE_KEYS = ['#','.','I','C','H','G'];
const PALETTE_INFO = {
  '#': {label:'壁',  cls:'pal-wall'},
  '.': {label:'床',  cls:'pal-floor'},
  'I': {label:'I', cls:'pal-item'},
  'C': {label:'C', cls:'pal-cool'},
  'H': {label:'H', cls:'pal-hot'},
  'G': {label:'G', cls:'pal-goal'},
};
const BLOCK_SETS = ['BASIC','CHECK','STATE','LOOK','SEARCH','ENEMY','COUNT'];
const AI_TYPES = ['','random','proximity','patrol'];

let state = {
  phases: null,
  selPhase: 'A',
  selStage: 0,
  tab: 'edit',
  paint: '#',
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && Array.isArray(obj.phases)) {
        state.phases = obj.phases;
        return true;
      }
    }
  } catch (e) { console.warn('load failed', e); }
  state.phases = deepClone(INITIAL_PHASES);
  return false;
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({phases: state.phases}));
  } catch (e) { console.warn('save failed', e); }
}
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

function curPhase() { return state.phases.find(p => p.id === state.selPhase); }
function curStage() {
  const p = curPhase();
  if (!p) return null;
  return p.stages[state.selStage] || null;
}
function selectStage(phId, idx) {
  state.selPhase = phId; state.selStage = idx;
  renderAll();
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderAll() { renderSidebar(); renderEditor(); }

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = `<div class="sb-title">グループ／ステージ</div>`;
  state.phases.forEach(ph => {
    const isCurPh = state.selPhase === ph.id;
    html += `<div class="sb-phase">
      <div class="sb-phase-head" data-act="ph-edit" data-ph="${ph.id}">
        <div class="sb-phase-pip" style="background:${ph.color}"></div>
        <div class="sb-phase-label">${esc(ph.id)} · ${esc(ph.name)}</div>
        <div class="sb-phase-count">${ph.stages.length}</div>
      </div>
      <div class="sb-stages">`;
    ph.stages.forEach((s, i) => {
      const active = (isCurPh && state.selStage === i) ? 'active' : '';
      html += `<div class="sb-stage ${active}" data-act="sel" data-ph="${ph.id}" data-idx="${i}">
        <div class="sb-stage-no">${String(s.no).padStart(2,'0')}</div>
        <div class="sb-stage-title">${esc(s.title)}</div>
        <div class="sb-stage-actions">
          <button class="sb-stage-btn" data-act="move-up" data-ph="${ph.id}" data-idx="${i}" title="上へ">▲</button>
          <button class="sb-stage-btn" data-act="move-down" data-ph="${ph.id}" data-idx="${i}" title="下へ">▼</button>
        </div>
      </div>`;
    });
    html += `<button class="sb-add" data-act="add-stage" data-ph="${ph.id}">＋ ステージ追加</button>`;
    html += `</div></div>`;
  });
  html += `<button class="sb-add" data-act="add-phase">＋ グループ追加</button>`;
  sb.innerHTML = html;
  sb.querySelectorAll('[data-act]').forEach(el => {
    el.addEventListener('click', ev => handleSidebarClick(el.dataset, ev));
  });
}

function handleSidebarClick(d, ev) {
  ev.stopPropagation();
  if (d.act === 'sel') { selectStage(d.ph, parseInt(d.idx)); }
  else if (d.act === 'ph-edit') { openPhaseDialog(d.ph); }
  else if (d.act === 'add-stage') { addStage(d.ph); }
  else if (d.act === 'add-phase') { openPhaseDialog(null); }
  else if (d.act === 'move-up') { moveStage(d.ph, parseInt(d.idx), -1); }
  else if (d.act === 'move-down') { moveStage(d.ph, parseInt(d.idx), 1); }
}

function moveStage(phId, idx, dir) {
  const phIdx = state.phases.findIndex(p => p.id === phId);
  if (phIdx < 0) return;
  const ph = state.phases[phIdx];
  if (idx < 0 || idx >= ph.stages.length) return;

  const selRef = curStage();
  const stage = ph.stages[idx];

  if (dir === -1) {
    if (idx > 0) {
      ph.stages.splice(idx, 1);
      ph.stages.splice(idx - 1, 0, stage);
    } else if (phIdx > 0) {
      ph.stages.splice(idx, 1);
      state.phases[phIdx - 1].stages.push(stage);
    } else return;
  } else if (dir === 1) {
    if (idx < ph.stages.length - 1) {
      ph.stages.splice(idx, 1);
      ph.stages.splice(idx + 1, 0, stage);
    } else if (phIdx < state.phases.length - 1) {
      ph.stages.splice(idx, 1);
      state.phases[phIdx + 1].stages.unshift(stage);
    } else return;
  }

  if (selRef) {
    for (const ph2 of state.phases) {
      const i = ph2.stages.indexOf(selRef);
      if (i >= 0) {
        state.selPhase = ph2.id;
        state.selStage = i;
        break;
      }
    }
  }

  renumberAll();
  saveState();
  renderAll();
}

function renumberAll() {
  let counter = 1;
  state.phases.forEach(ph => {
    ph.stages.forEach(s => {
      s.no = counter;
      const m = s.id && s.id.match(/^step-\d+-(.+)$/);
      if (m) {
        s.id = `step-${String(counter).padStart(2, '0')}-${m[1]}`;
      }
      counter++;
    });
  });
}

function addStage(phId) {
  const ph = state.phases.find(p => p.id === phId);
  if (!ph) return;
  const newStage = {
    no: 0,
    id: 'step-00-new',
    title: '新規ステージ',
    blockSet: 'BASIC',
    variants: 1,
    cond: 'goal',
    goal: '',
    rule: '',
    maps: [makeBlankMap(7,7)],
  };
  ph.stages.push(newStage);
  state.selPhase = phId; state.selStage = ph.stages.length - 1;
  renumberAll();
  saveState(); renderAll();
}

function makeBlankMap(cols, rows) {
  const arr = [];
  for (let r=0; r<rows; r++) {
    let line = '';
    for (let c=0; c<cols; c++) {
      if (r===0 || r===rows-1 || c===0 || c===cols-1) line += '#';
      else line += '.';
    }
    arr.push(line);
  }
  if (rows>=4 && cols>=4) {
    arr[1] = setCh(arr[1], 1, 'G');
    arr[rows-2] = setCh(arr[rows-2], cols-2, 'C');
  }
  return {label:'マップ A', rows:arr, note:''};
}
function setCh(s, i, ch) { return s.substring(0,i) + ch + s.substring(i+1); }
function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ── EDITOR ── */
function renderEditor() {
  const ed = document.getElementById('editor');
  const s = curStage();
  if (!s) { ed.innerHTML = `<div class="empty">ステージを選んでください</div>`; return; }
  let html = `
    <div class="tab-bar">
      <div class="tab ${state.tab==='edit'?'active':''}" data-tab="edit">編集</div>
      <div class="tab ${state.tab==='preview'?'active':''}" data-tab="preview">プレビュー</div>
    </div>`;
  if (state.tab === 'edit') html += renderEditForm(s);
  else html += renderPreview(s);
  ed.innerHTML = html;
  ed.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    state.tab = t.dataset.tab; renderEditor();
  }));
  if (state.tab === 'edit') wireEditForm(s);
}

function renderEditForm(s) {
  const ph = curPhase();
  let html = `
    <div class="field-row">
      <div class="field" style="max-width:80px"><label>番号（自動）</label><div class="field-display">${String(s.no).padStart(2,'0')}</div></div>
      <div class="field"><label>ID</label><input type="text" class="mono" id="f-id" value="${esc(s.id)}"><div class="field-hint">step-NN- プレフィックスは並び順から自動更新</div></div>
      <div class="field"><label>所属グループ</label><select id="f-ph">${state.phases.map(p=>`<option value="${p.id}" ${p.id===ph.id?'selected':''}>${esc(p.id)} · ${esc(p.name)}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>タイトル</label><input type="text" id="f-title" value="${esc(s.title)}"></div>
    <div class="field-row">
      <div class="field"><label>ブロックセット</label><select id="f-blockset">${BLOCK_SETS.map(b=>`<option ${b===s.blockSet?'selected':''}>${b}</option>`).join('')}</select></div>
      <div class="field"><label>クリア条件</label><input type="text" id="f-cond" value="${esc(s.cond)}"></div>
      <div class="field"><label>敵AI</label><select id="f-ai">${AI_TYPES.map(a=>`<option value="${a}" ${a===(s.ai||'')?'selected':''}>${a||'なし'}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>学習目標</label><textarea id="f-goal">${esc(s.goal)}</textarea></div>
    <div class="field"><label>反応型ルール</label><textarea id="f-rule" class="mono">${esc(s.rule)}</textarea></div>
    <div class="field-row">
      <div class="field"><label>新システム（任意）</label><input type="text" id="f-newsys" value="${esc(s.newSys||'')}" placeholder="未実装ブロック等"></div>
      <div class="field"><label>マップ注記（任意）</label><input type="text" id="f-mapsnote" value="${esc(s.mapsNote||'')}"></div>
    </div>

    <div class="section-title">マップ
      <div class="section-title-actions">
        <button class="mini-btn" id="btn-add-map">＋ バリアント追加</button>
        <button class="mini-btn danger" id="btn-del-stage">ステージ削除</button>
      </div>
    </div>`;

  s.maps.forEach((m, mi) => {
    const cols = m.rows[0]?.length || 0;
    const rows = m.rows.length;
    html += `<div class="map-edit-block" data-mi="${mi}">
      <div class="map-edit-head">
        <input type="text" data-f="label" value="${esc(m.label)}" placeholder="ラベル">
        <div class="size-controls">
          幅 <input type="number" data-f="cols" value="${cols}" min="3" max="25">
          高 <input type="number" data-f="rows" value="${rows}" min="3" max="25">
        </div>
        <button class="mini-btn danger" data-act="del-map">削除</button>
      </div>
      <div class="palette">
        <span class="palette-label">パレット</span>
        ${PALETTE_KEYS.map(k=>`<div class="pal ${PALETTE_INFO[k].cls} ${k===state.paint?'active':''}" data-paint="${k}" title="${PALETTE_INFO[k].label}">${k==='.'?'':k}</div>`).join('')}
      </div>
      <div class="map-grid-edit" style="grid-template-columns: repeat(${cols}, 22px)">
        ${m.rows.map((row, ri) => [...row].map((ch, ci) =>
          `<div class="cell ${cellClass(ch)}" data-ri="${ri}" data-ci="${ci}">${(ch==='.'||ch==='#')?'':ch}</div>`
        ).join('')).join('')}
      </div>
      <div class="ascii-preview">${m.rows.map(r=>esc(r)).join('\n')}</div>
      <div class="field" style="margin-top:8px"><label>マップ注記</label><input type="text" data-f="note" value="${esc(m.note||'')}"></div>
    </div>`;

}

function cellClass(ch) {
  return {
    '#':'c-wall','.':'c-floor',' ':'c-floor',
    'I':'c-item','C':'c-cool','H':'c-hot','G':'c-goal'
  }[ch] || 'c-floor';
}

function wireEditForm(s) {
  const ed = document.getElementById('editor');

  // metadata fields
  const fieldMap = {
    'f-id': v => { s.id = v; },
    'f-title': v => { s.title = v; renderSidebar(); },
    'f-blockset': v => { s.blockSet = v; },
    'f-cond': v => { s.cond = v; },
    'f-ai': v => { if (v) s.ai = v; else delete s.ai; },
    'f-goal': v => { s.goal = v; },
    'f-rule': v => { s.rule = v; },
    'f-newsys': v => { if (v) s.newSys = v; else delete s.newSys; },
    'f-mapsnote': v => { if (v) s.mapsNote = v; else delete s.mapsNote; },
    'f-ph': v => {
      const fromPh = curPhase();
      const toPh = state.phases.find(p => p.id === v);
      if (!toPh || toPh === fromPh) return;
      fromPh.stages.splice(state.selStage, 1);
      toPh.stages.push(s);
      state.selPhase = v;
      state.selStage = toPh.stages.length - 1;
      renumberAll();
      saveState(); renderAll();
    },
  };
  Object.entries(fieldMap).forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => { fn(el.value); saveState(); });
    el.addEventListener('change', () => { fn(el.value); saveState(); });
  });

  // map editor: palette + cells + resize + label/note + del
  ed.querySelectorAll('.map-edit-block').forEach(block => {
    const mi = parseInt(block.dataset.mi);
    const m = s.maps[mi];

    block.querySelectorAll('.pal').forEach(p => {
      p.addEventListener('click', () => {
        state.paint = p.dataset.paint;
        block.querySelectorAll('.pal').forEach(x => x.classList.toggle('active', x.dataset.paint===state.paint));
      });
    });

    let painting = false;
    const paint = (cell) => {
      const ri = parseInt(cell.dataset.ri), ci = parseInt(cell.dataset.ci);
      m.rows[ri] = setCh(m.rows[ri], ci, state.paint);
      cell.className = `cell ${cellClass(state.paint)}`;
      cell.textContent = (state.paint==='.'||state.paint==='#') ? '' : state.paint;
      block.querySelector('.ascii-preview').textContent = m.rows.join('\n');
      saveState();
    };
    block.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('mousedown', e => { painting = true; paint(cell); e.preventDefault(); });
      cell.addEventListener('mouseenter', e => { if (painting) paint(cell); });
    });
    document.addEventListener('mouseup', () => { painting = false; });

    block.querySelectorAll('[data-f]').forEach(input => {
      input.addEventListener('input', () => {
        const f = input.dataset.f, v = input.value;
        if (f === 'label') { m.label = v; }
        else if (f === 'note') { m.note = v; }
        else if (f === 'cols' || f === 'rows') {
          const cols = parseInt(block.querySelector('[data-f=cols]').value) || 1;
          const rowsN = parseInt(block.querySelector('[data-f=rows]').value) || 1;
          resizeMap(m, cols, rowsN);
          renderEditor();
        }
        saveState();
      });
    });

    const del = block.querySelector('[data-act=del-map]');
    if (del) del.addEventListener('click', () => {
      if (s.maps.length <= 1) { toast('最低1マップ必要です', 'error'); return; }
      s.maps.splice(mi, 1);
      s.variants = s.maps.length;
      saveState(); renderEditor();
    });
  });

  const addMap = ed.querySelector('#btn-add-map');
  if (addMap) addMap.addEventListener('click', () => {
    const last = s.maps[s.maps.length-1];
    const cols = last.rows[0].length, rows = last.rows.length;
    const newMap = makeBlankMap(cols, rows);
    newMap.label = `マップ ${String.fromCharCode(65 + s.maps.length)}`;
    s.maps.push(newMap);
    s.variants = s.maps.length;
    saveState(); renderEditor();
  });

  const delStage = ed.querySelector('#btn-del-stage');
  if (delStage) delStage.addEventListener('click', () => {
    if (!confirm(`ステージ「${s.title}」を削除しますか？`)) return;
    const ph = curPhase();
    ph.stages.splice(state.selStage, 1);
    state.selStage = Math.max(0, Math.min(state.selStage, ph.stages.length - 1));
    if (ph.stages.length === 0) {
      // フェーズが空になった場合は前のフェーズの末尾へ
      const phIdx = state.phases.indexOf(ph);
      for (let i = phIdx - 1; i >= 0; i--) {
        if (state.phases[i].stages.length > 0) {
          state.selPhase = state.phases[i].id;
          state.selStage = state.phases[i].stages.length - 1;
          break;
        }
      }
    }
    renumberAll();
    saveState(); renderAll();
  });
}

function resizeMap(m, cols, rows) {
  const oldRows = m.rows;
  const out = [];
  for (let r=0; r<rows; r++) {
    let line = '';
    for (let c=0; c<cols; c++) {
      let ch;
      if (r===0 || r===rows-1 || c===0 || c===cols-1) ch = '#';
      else if (r < oldRows.length && c < (oldRows[r]||'').length) ch = oldRows[r][c];
      else ch = '.';
      line += ch;
    }
    out.push(line);
  }
  m.rows = out;
}

/* ══════════════════════════════════════════
   PREVIEW（stage_review.html と同形式）
══════════════════════════════════════════ */
function renderPreview(s) {
  const ph = curPhase();
  return `<div class="preview-wrap">${stageCardHTML(s, ph)}</div>`;
}

function stageCardHTML(s, ph) {
  const badgeHTML = [
    blockBadge(s.blockSet),
    `<span class="badge badge--block">${s.variants||(s.maps?s.maps.length:1)}バリアント</span>`,
    condBadge(s.cond),
    s.ai ? aiBadge(s.ai) : '',
    s.newSys ? `<span class="badge badge--new-sys">⚠ ${esc(s.newSys)}</span>` : '',
  ].filter(Boolean).join('');

  const mapsHTML = s.maps && s.maps.length
    ? `<div><div class="field-label">マップ</div><div class="maps-wrap">${s.maps.map(m=>mapBlock(m.label, m.rows, m.note||'')).join('')}</div></div>`
    : (s.mapsNote ? `<div><div class="field-label">マップ</div><div class="variant-note">${esc(s.mapsNote)}</div></div>` : '');

  return `<div class="stage-card">
    <div class="card-header">
      <div class="step-num">${String(s.no).padStart(2,'0')}</div>
      <div class="card-title-area">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-id">${esc(s.id)}</div>
      </div>
      <div class="phase-pip" style="background:${ph.color}"></div>
    </div>
    <div class="card-badges">${badgeHTML}</div>
    <div class="card-body">
      <div><div class="field-label">学習目標</div><div class="field-value">${esc(s.goal)}</div></div>
      <div><div class="field-label">反応型ルール</div><div class="field-value field-mono">${esc(s.rule)||'—'}</div></div>
      ${mapsHTML}
    </div>
  </div>`;
}

function renderMapPV(rows) {
  const map = {'#':'wall','.':'floor','I':'item','C':'cool','H':'hot','G':'goal',' ':'floor'};
  const label = {wall:'',floor:'',item:'I',cool:'C',hot:'H',goal:'G'};
  return rows.map(row =>
    `<div class="map-row">${[...row].map(ch=>{
      const cls = map[ch]||'floor';
      return `<div class="preview-cell c-${cls}">${label[cls]||''}</div>`;
    }).join('')}</div>`
  ).join('');
}
function mapBlock(varLabel, rows, note='') {
  if (!rows || !rows.length) return '';
  const cols = rows[0].length;
  return `<div>
    <div class="map-label">${esc(varLabel)}</div>
    <div class="map-grid" style="grid-template-columns: repeat(${cols}, 16px)">${renderMapPV(rows)}</div>
    ${note?`<div style="font-size:10px;color:#64748b;margin-top:3px">${esc(note)}</div>`:''}
  </div>`;
}
function blockBadge(set) {
  const cls = {BASIC:'badge--block',CHECK:'badge--cond',STATE:'badge--var',LOOK:'badge--look',SEARCH:'badge--look',ENEMY:'badge--enemy',COUNT:'badge--count'};
  return `<span class="badge ${cls[set]||'badge--block'}">${esc(set)}</span>`;
}
function condBadge(cond) {
  const c = (cond||'').toLowerCase();
  let cls = 'badge--goal';
  if (c.includes('put')) cls='badge--put';
  else if (c.includes('survive')) cls='badge--survive';
  else if (c.includes('items')) cls='badge--items';
  return `<span class="badge ${cls}">${esc(cond)}</span>`;
}
function aiBadge(ai) {
  if (!ai) return '';
  if (ai==='random')    return `<span class="badge badge--ai-r">AI: random</span>`;
  if (ai==='proximity') return `<span class="badge badge--ai-p">AI: proximity</span>`;
  if (ai==='patrol')    return `<span class="badge badge--ai-r">AI: patrol</span>`;
  return `<span class="badge badge--ai-r">AI: ${esc(ai)}</span>`;
}

/* ══════════════════════════════════════════
   PHASE DIALOG
══════════════════════════════════════════ */
let phaseDialogTarget = null;
function openPhaseDialog(phId) {
  phaseDialogTarget = phId;
  const ph = phId ? state.phases.find(p=>p.id===phId) : null;
  document.getElementById('phase-dialog-title').textContent = ph ? `グループ「${ph.id}」を編集` : '新規グループ';
  document.getElementById('ph-id').value = ph ? ph.id : nextPhaseId();
  document.getElementById('ph-name').value = ph ? ph.name : '';
  document.getElementById('ph-range').value = ph ? ph.range : '';
  document.getElementById('ph-desc').value = ph ? ph.desc : '';
  document.getElementById('ph-color').value = ph ? ph.color : '#64748b';
  document.getElementById('ph-bg').value = ph ? ph.bg : '#f1f5f9';
  document.getElementById('phase-dialog').classList.add('show');
}
function closePhaseDialog() { document.getElementById('phase-dialog').classList.remove('show'); }
function nextPhaseId() {
  const used = new Set(state.phases.map(p=>p.id));
  for (let i=65; i<=90; i++) { const c = String.fromCharCode(i); if (!used.has(c)) return c; }
  return 'X';
}

document.getElementById('phase-dialog-cancel').addEventListener('click', closePhaseDialog);
document.getElementById('phase-dialog-ok').addEventListener('click', () => {
  const id = document.getElementById('ph-id').value.trim().toUpperCase();
  if (!id) { toast('IDを入力', 'error'); return; }
  const newPh = {
    id,
    name: document.getElementById('ph-name').value || '新規',
    range: document.getElementById('ph-range').value || '',
    desc: document.getElementById('ph-desc').value || '',
    color: document.getElementById('ph-color').value,
    bg: document.getElementById('ph-bg').value,
    stages: [],
  };
  if (phaseDialogTarget) {
    const idx = state.phases.findIndex(p=>p.id===phaseDialogTarget);
    if (idx >= 0) {
      newPh.stages = state.phases[idx].stages;
      // ID変更を許可
      state.phases[idx] = newPh;
      if (state.selPhase === phaseDialogTarget) state.selPhase = id;
    }
  } else {
    if (state.phases.some(p=>p.id===id)) { toast('そのIDは使用済み', 'error'); return; }
    state.phases.push(newPh);
  }
  saveState(); renderAll(); closePhaseDialog();
});

/* ══════════════════════════════════════════
   FILE I/O
══════════════════════════════════════════ */
document.getElementById('btn-save').addEventListener('click', () => {
  renumberAll();
  const data = JSON.stringify({version:1, phases:state.phases}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const today = new Date().toISOString().slice(0,10);
  a.download = `chaiser-stages-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('JSON保存しました', 'ok');
});

document.getElementById('btn-load').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', ev => {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const obj = JSON.parse(r.result);
      if (!obj.phases || !Array.isArray(obj.phases)) throw new Error('phases配列なし');
      state.phases = obj.phases;
      state.selPhase = obj.phases[0]?.id || 'A';
      state.selStage = 0;
      renumberAll();
      saveState(); renderAll();
      toast('JSON読込しました', 'ok');
    } catch (e) { toast('読込失敗: '+e.message, 'error'); }
  };
  r.readAsText(f);
  ev.target.value = '';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('編集内容を破棄して初期50ステージに戻しますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  state.phases = deepClone(INITIAL_PHASES);
  state.selPhase = 'A'; state.selStage = 0;
  renumberAll();
  saveState(); renderAll();
  toast('リセットしました', 'ok');
});

document.getElementById('btn-export-html').addEventListener('click', () => {
  renumberAll();
  const html = buildReviewHTML(state.phases);
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stage_review.html';
  a.click();
  URL.revokeObjectURL(url);
  toast('HTML書き出しました', 'ok');
});

/* ── 出力HTMLを stage_review.html と同形式で組み立て ── */
function buildReviewHTML(phases) {
  // stage_review.html のCSSとレンダリングロジックを内蔵した完成版HTMLを返す
  const dataJSON = JSON.stringify(phases);
  const total = phases.reduce((a,p)=>a+p.stages.length,0);
  return `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHaser チュートリアル ステージ一覧</title>
<style>
:root {

  --panel:rgba(255,255,255,0.90);--panel-strong:rgba(255,255,255,0.97);

body{font-family:var(--font-ui);color:var(--ink);background-color:#f8fafc;
background-image:radial-gradient(700px 400px at 8% 12%,rgba(56,189,248,0.18),transparent 65%),
radial-gradient(680px 380px at 95% -4%,rgba(251,146,60,0.20),transparent 60%),
radial-gradient(520px 320px at 45% 0%,rgba(94,234,212,0.14),transparent 62%),
linear-gradient(rgba(15,23,42,0.04) 1px,transparent 1px),
linear-gradient(90deg,rgba(15,23,42,0.04) 1px,transparent 1px),
linear-gradient(180deg,#f8fafc 0%,#f1f5f9 55%,#eef2ff 100%);
background-size:auto,auto,auto,26px 26px,26px 26px,auto;min-height:100vh;}
.site-header{position:sticky;top:0;z-index:50;background:linear-gradient(120deg,#0f172a 0%,#1e293b 55%,#0b1020 100%);border-bottom:1px solid rgba(148,163,184,0.2);box-shadow:0 4px 24px rgba(15,23,42,0.25);}
.header-inner{max-width:1400px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.header-logo{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:0.1em;color:#f8fafc;}
.header-logo span{color:var(--cool);}
.header-sub{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(148,163,184,0.8);margin-left:8px;}
.header-count{background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.3);border-radius:999px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#e2e8f0;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.header-btn{background:rgba(15,23,42,0.5);border:1px solid rgba(148,163,184,0.3);color:#e2e8f0;border-radius:999px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.header-btn:hover{background:rgba(56,189,248,0.2);border-color:var(--cool);color:#fff;}
.bs-modal{position:fixed;inset:0;background:rgba(15,23,42,0.7);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.bs-modal.show{display:flex;}
.bs-modal-inner{background:#fff;border-radius:20px;padding:22px 26px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 24px 60px rgba(0,0,0,0.4);}
.bs-modal-close{position:absolute;top:14px;right:16px;background:#f1f5f9;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:18px;color:#64748b;display:flex;align-items:center;justify-content:center;line-height:1;}
.bs-modal-close:hover{background:#e2e8f0;color:var(--ink);}
.bs-modal-title{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:0.06em;margin-bottom:4px;}
.bs-modal-sub{font-size:11px;color:#64748b;margin-bottom:16px;line-height:1.5;}
.bs-card{border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:8px;background:#fafbfc;}
.bs-card-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.bs-card-range{font-size:10px;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;}
.bs-card-inherits{font-size:10px;color:#94a3b8;font-style:italic;}
.bs-card-desc{font-size:12px;color:#475569;margin-bottom:7px;line-height:1.5;}
.bs-card-blocks{display:flex;flex-wrap:wrap;gap:4px;}
.bs-block-chip{font-family:monospace;font-size:10px;background:#fff;color:#475569;padding:3px 8px;border-radius:6px;border:1px solid #cbd5e1;}
.phase-nav{max-width:1400px;margin:0 auto;padding:16px 24px 0;display:flex;gap:8px;flex-wrap:wrap;}
.phase-tab{padding:6px 16px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;text-decoration:none;border:1px solid transparent;}

.main{max-width:1400px;margin:0 auto;padding:24px;}
.phase-section{margin-bottom:48px;}
.phase-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px 20px;border-radius:20px;color:#e2e8f0;background:linear-gradient(120deg,#0f172a 0%,#1e293b 55%,#0b1020 100%);border:1px solid rgba(148,163,184,0.22);}
.phase-label{font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:0.12em;}
.phase-name{font-size:15px;font-weight:600;color:#cbd5e1;}

.card-header{padding:14px 18px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);}

.card-title-area{flex:1;}
.card-title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;}

.phase-pip{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}

.badge{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid transparent;}
.badge--block{background:#f1f5f9;color:#475569;border-color:#cbd5e1;}
.badge--var{background:#ede9fe;color:#7c3aed;border-color:#c4b5fd;}
.badge--cond{background:#e0f2fe;color:#0369a1;border-color:#7dd3fc;}
.badge--items{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.badge--look{background:#ccfbf1;color:#0f766e;border-color:#5eead4;}
.badge--put{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.badge--enemy{background:#ffedd5;color:#9a3412;border-color:#fdba74;}
.badge--count{background:#f3e8ff;color:#7e22ce;border-color:#d8b4fe;}
.badge--goal{background:#f0fdf4;color:#166534;border-color:#86efac;}
.badge--survive{background:#fff1f2;color:#9f1239;border-color:#fda4af;}
.badge--ai-r{background:#fafaf9;color:#57534e;border-color:#a8a29e;}
.badge--ai-p{background:#fff7ed;color:#c2410c;border-color:#fdba74;}

.card-body{padding:12px 18px;flex:1;display:flex;flex-direction:column;gap:10px;}
.field-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#94a3b8;margin-bottom:3px;}
.field-value{font-size:12px;color:var(--ink-soft);line-height:1.5;}
.field-mono{font-family:monospace;font-size:11px;}

</style></head>
<body>
<header class="site-header"><div class="header-inner">
  <div><span class="header-logo">CH<span>aser</span></span><span class="header-sub">Tutorial Stage Review</span></div>
  <div class="header-right">
    <button class="header-btn" id="btn-bs">ブロックセット</button>
    <div class="header-count">${total} Stages · ${phases.length} Groups</div>
  </div>
</div></header>
<div class="bs-modal" id="bs-modal">
  <div class="bs-modal-inner">
    <button class="bs-modal-close" id="bs-modal-close" aria-label="閉じる">×</button>
    <div class="bs-modal-title">ブロックセット一覧</div>
    <div class="bs-modal-sub">各レベルで使えるブロック群。下位のセットは上位を含む（インクルード方式）。</div>
    <div id="bs-modal-body"></div>
  </div>
</div>
<nav class="phase-nav" aria-label="フェーズ" id="phase-nav"></nav>
<main class="main" id="main"></main>
<script>
const PHASES = ${dataJSON};
const BLOCK_SETS_INFO = [
  {name:'BASIC',range:'Step 01〜',cls:'badge--block',desc:'毎ターン同じ行動を繰り返す。最小構成。',blocks:['chaser_on_turn','chaser_action_walk','chaser_turn_end']},
  {name:'CHECK',range:'Step 04〜',cls:'badge--cond',inherits:'BASIC',desc:'条件分岐と壁判定。「毎ターン判断する」反応型の核心。',blocks:['controls_if','logic_compare','chaser_is_tile','chaser_tile_value','chaser_get_tile','math_number']},
  {name:'STATE',range:'Step 11〜',cls:'badge--var',inherits:'CHECK',desc:'変数による状態管理。過去の観測・判断を記憶する。',blocks:['chaser_on_start','chaser_state_*','chaser_last_direction','chaser_direction_value','chaser_get_around','chaser_action_walk_last','chaser_turn_number','math_modulo','logic_operation']},
  {name:'LOOK',range:'Step 21〜',cls:'badge--look',inherits:'STATE',desc:'look アクションで 3×3 視野を観測する。観測結果は配列で取得。',blocks:['chaser_action_look','chaser_observation']},
  {name:'SEARCH',range:'Step 23〜',cls:'badge--look',inherits:'LOOK',desc:'search アクションで直線9マスを観測。put でブロック設置・敵撃破。',blocks:['chaser_action_search','chaser_action_put']},
  {name:'ENEMY',range:'Step 33〜',cls:'badge--enemy',inherits:'SEARCH',desc:'動く敵（random/proximity AI）に対応。ランダム歩行ブロック追加。',blocks:['chaser_action_walk_random']},
  {name:'COUNT',range:'Step 43〜',cls:'badge--count',inherits:'ENEMY',desc:'観測結果からアイテム数を集計。複数バリアントの汎用処理に利用。',blocks:['chaser_view_count_tile']},
];
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderMap(rows){
  const map={'#':'wall','.':'floor','I':'item','C':'cool','H':'hot','G':'goal',' ':'floor'};
  const label={wall:'',floor:'',item:'I',cool:'C',hot:'H',goal:'G'};
  return rows.map(row=>'<div class="map-row">'+[...row].map(ch=>{const cls=map[ch]||'floor';return '<div class="cell c-'+cls+'">'+(label[cls]||'')+'</div>';}).join('')+'</div>').join('');
}
function mapBlock(label,rows,note){
  if(!rows||!rows.length) return '';
  return '<div><div class="map-label">'+esc(label)+'</div><div class="map-grid">'+renderMap(rows)+'</div>'+(note?'<div style="font-size:10px;color:#64748b;margin-top:3px">'+esc(note)+'</div>':'')+'</div>';
}
function blockBadge(set){const cls={BASIC:'badge--block',CHECK:'badge--cond',STATE:'badge--var',LOOK:'badge--look',SEARCH:'badge--look',ENEMY:'badge--enemy',COUNT:'badge--count'};return '<span class="badge '+(cls[set]||'badge--block')+'">'+esc(set)+'</span>';}
function condBadge(cond){const c=(cond||'').toLowerCase();let cls='badge--goal';if(c.includes('put'))cls='badge--put';else if(c.includes('survive'))cls='badge--survive';else if(c.includes('items'))cls='badge--items';return '<span class="badge '+cls+'">'+esc(cond)+'</span>';}
function aiBadge(ai){if(!ai)return '';if(ai==='random')return '<span class="badge badge--ai-r">AI: random</span>';if(ai==='proximity')return '<span class="badge badge--ai-p">AI: proximity</span>';return '<span class="badge badge--ai-r">AI: '+esc(ai)+'</span>';}
function stageCard(s,phColor){
  const badges=[blockBadge(s.blockSet),'<span class="badge badge--block">'+(s.variants||(s.maps?s.maps.length:1))+'バリアント</span>',condBadge(s.cond),s.ai?aiBadge(s.ai):'',s.newSys?'<span class="badge badge--new-sys">⚠ '+esc(s.newSys)+'</span>':''].filter(Boolean).join('');
  const mapsHTML=s.maps&&s.maps.length?'<div><div class="field-label">マップ</div><div class="maps-wrap">'+s.maps.map(m=>mapBlock(m.label,m.rows,m.note||'')).join('')+'</div></div>':(s.mapsNote?'<div><div class="field-label">マップ</div><div class="variant-note">'+esc(s.mapsNote)+'</div></div>':'');
  return '<div class="stage-card"><div class="card-header"><div class="step-num">'+String(s.no).padStart(2,'0')+'</div><div class="card-title-area"><div class="card-title">'+esc(s.title)+'</div><div class="card-id">'+esc(s.id)+'</div></div><div class="phase-pip" style="background:'+phColor+'"></div></div><div class="card-badges">'+badges+'</div><div class="card-body"><div><div class="field-label">学習目標</div><div class="field-value">'+esc(s.goal)+'</div></div><div><div class="field-label">反応型ルール</div><div class="field-value field-mono">'+(esc(s.rule)||'—')+'</div></div>'+mapsHTML+'</div></div>';
}
const main=document.getElementById('main');
const nav=document.getElementById('phase-nav');
nav.innerHTML=PHASES.map(p=>'<a class="phase-tab" style="background:'+p.bg+';color:'+p.color+';border-color:'+p.color+'" href="#phase-'+p.id+'">'+p.id+' '+esc(p.name)+'</a>').join('');
PHASES.forEach(ph=>{
  main.innerHTML+='<section class="phase-section phase-anchor" id="phase-'+ph.id+'"><div class="phase-header"><div class="phase-label" style="color:'+ph.color+'">Phase '+ph.id+'</div><div><div class="phase-name">'+esc(ph.name)+'</div><div style="font-size:11px;color:#94a3b8;margin-top:2px">'+esc(ph.desc)+'</div></div><div class="phase-range">Step '+esc(ph.range)+'</div></div><div class="stage-grid">'+ph.stages.map(s=>stageCard(s,ph.color)).join('')+'</div></section>';
});
function renderBlockSetsModal(){return BLOCK_SETS_INFO.map(bs=>'<div class="bs-card"><div class="bs-card-head"><span class="badge '+bs.cls+'">'+bs.name+'</span><span class="bs-card-range">'+bs.range+'</span>'+(bs.inherits?'<span class="bs-card-inherits">⊃ '+bs.inherits+' のすべて</span>':'')+'</div><div class="bs-card-desc">'+bs.desc+'</div><div class="bs-card-blocks">'+bs.blocks.map(b=>'<span class="bs-block-chip">'+b+'</span>').join('')+'</div></div>').join('');}
document.getElementById('btn-bs').addEventListener('click',()=>{document.getElementById('bs-modal-body').innerHTML=renderBlockSetsModal();document.getElementById('bs-modal').classList.add('show');});
document.getElementById('bs-modal-close').addEventListener('click',()=>{document.getElementById('bs-modal').classList.remove('show');});
document.getElementById('bs-modal').addEventListener('click',e=>{if(e.target.id==='bs-modal')document.getElementById('bs-modal').classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('bs-modal').classList.remove('show');});
</`+`script>
</body></html>`;
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastTimer = null;
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className = 'toast '+type; }, 2200);
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
loadState();
renumberAll();
renderAll();
</script>
</body>
</html>
