<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHaser チュートリアル ステージ一覧</title>
<style>
:root {
  --cool: #38bdf8;
  --hot:  #fb7185;
  --ink:  #0f172a;
  --ink-soft: #334155;
  --panel: rgba(255,255,255,0.90);
  --panel-strong: rgba(255,255,255,0.97);
  --border: rgba(15,23,42,0.12);
  --font-ui: "Space Grotesk", system-ui, sans-serif;
  --font-display: "Oxanium", "Space Grotesk", system-ui, sans-serif;

  /* phase colours */
  --ph-a: #64748b; --ph-a-bg: #f1f5f9;
  --ph-b: #0ea5e9; --ph-b-bg: #e0f2fe;
  --ph-c: #8b5cf6; --ph-c-bg: #ede9fe;
  --ph-d: #f59e0b; --ph-d-bg: #fef3c7;
  --ph-e: #14b8a6; --ph-e-bg: #ccfbf1;
  --ph-f: #ef4444; --ph-f-bg: #fee2e2;
  --ph-g: #f97316; --ph-g-bg: #ffedd5;
  --ph-h: #a855f7; --ph-h-bg: #f3e8ff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  color: var(--ink);
  background-color: #f8fafc;
  background-image:
    radial-gradient(700px 400px at 8% 12%, rgba(56,189,248,0.18), transparent 65%),
    radial-gradient(680px 380px at 95% -4%, rgba(251,146,60,0.20), transparent 60%),
    radial-gradient(520px 320px at 45% 0%, rgba(94,234,212,0.14), transparent 62%),
    linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px),
    linear-gradient(180deg, #f8fafc 0%, #f1f5f9 55%, #eef2ff 100%);
  background-size: auto,auto,auto,26px 26px,26px 26px,auto;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(120deg,#0f172a 0%,#1e293b 55%,#0b1020 100%);
  border-bottom: 1px solid rgba(148,163,184,0.2);
  box-shadow: 0 4px 24px rgba(15,23,42,0.25);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.header-logo {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 800; letter-spacing: 0.1em;
  color: #f8fafc;
}
.header-logo span { color: var(--cool); }
.header-sub {
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(148,163,184,0.8); margin-left: 8px;
}
.header-count {
  background: rgba(15,23,42,0.6);
  border: 1px solid rgba(148,163,184,0.3);
  border-radius: 999px;
  padding: 4px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #e2e8f0;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-btn {
  background: rgba(15,23,42,0.5);
  border: 1px solid rgba(148,163,184,0.3);
  color: #e2e8f0;
  border-radius: 999px;
  padding: 4px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.header-btn:hover {
  background: rgba(56,189,248,0.2);
  border-color: var(--cool);
  color: #fff;
}

/* ── BLOCK SET MODAL ── */
.bs-modal {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.7);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 20px;
}
.bs-modal.show { display: flex; }
.bs-modal-inner {
  background: #fff;
  border-radius: 20px;
  padding: 22px 26px;
  max-width: 720px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.bs-modal-close {
  position: absolute; top: 14px; right: 16px;
  background: #f1f5f9; border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  cursor: pointer;
  font-size: 18px;
  color: #64748b;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.bs-modal-close:hover { background: #e2e8f0; color: var(--ink); }
.bs-modal-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 800;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.bs-modal-sub {
  font-size: 11px; color: #64748b;
  margin-bottom: 16px;
  line-height: 1.5;
}
.bs-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px;
  margin-bottom: 8px;
  background: #fafbfc;
}
.bs-card-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.bs-card-range { font-size: 10px; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
.bs-card-inherits { font-size: 10px; color: #94a3b8; font-style: italic; }
.bs-card-desc { font-size: 12px; color: #475569; margin-bottom: 7px; line-height: 1.5; }
.bs-card-blocks {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.bs-block-chip {
  font-family: monospace; font-size: 10px;
  background: #fff; color: #475569;
  padding: 3px 8px; border-radius: 6px;
  border: 1px solid #cbd5e1;
}

/* ── PHASE NAV ── */
.phase-nav {
  max-width: 1400px; margin: 0 auto;
  padding: 16px 24px 0;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.phase-tab {
  padding: 6px 16px; border-radius: 999px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s; text-decoration: none;
  border: 1px solid transparent;
}
.phase-tab:hover { opacity: 0.85; }
.phase-tab[data-ph="A"] { background: var(--ph-a-bg); color: var(--ph-a); border-color: var(--ph-a); }
.phase-tab[data-ph="B"] { background: var(--ph-b-bg); color: var(--ph-b); border-color: var(--ph-b); }
.phase-tab[data-ph="C"] { background: var(--ph-c-bg); color: var(--ph-c); border-color: var(--ph-c); }
.phase-tab[data-ph="D"] { background: var(--ph-d-bg); color: var(--ph-d); border-color: var(--ph-d); }
.phase-tab[data-ph="E"] { background: var(--ph-e-bg); color: var(--ph-e); border-color: var(--ph-e); }
.phase-tab[data-ph="F"] { background: var(--ph-f-bg); color: var(--ph-f); border-color: var(--ph-f); }
.phase-tab[data-ph="G"] { background: var(--ph-g-bg); color: var(--ph-g); border-color: var(--ph-g); }
.phase-tab[data-ph="H"] { background: var(--ph-h-bg); color: var(--ph-h); border-color: var(--ph-h); }

/* ── MAIN ── */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* ── PHASE SECTION ── */
.phase-section { margin-bottom: 48px; }
.phase-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px; padding: 14px 20px;
  border-radius: 20px;
  color: #e2e8f0;
  background: linear-gradient(120deg,#0f172a 0%,#1e293b 55%,#0b1020 100%);
  border: 1px solid rgba(148,163,184,0.22);
}
.phase-label {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 800; letter-spacing: 0.12em;
}
.phase-name { font-size: 15px; font-weight: 600; color: #cbd5e1; }
.phase-range {
  margin-left: auto;
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
  color: rgba(226,232,240,0.6); text-transform: uppercase;
}
.phase-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 999px;
  background: rgba(15,23,42,0.5); border: 1px solid rgba(148,163,184,0.3);
}

/* ── STAGE GRID ── */
.stage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 16px;
}

/* ── STAGE CARD ── */
.stage-card {
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.card-header {
  padding: 14px 18px 10px;
  display: flex; align-items: flex-start; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.step-num {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
  line-height: 1; min-width: 42px;
  color: var(--ink);
}
.card-title-area { flex: 1; }
.card-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }
.card-id { font-size: 10px; color: #94a3b8; margin-top: 2px; font-family: monospace; }
.phase-pip {
  width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0;
}

/* badge strip */
.card-badges {
  padding: 8px 18px;
  display: flex; flex-wrap: wrap; gap: 6px;
  border-bottom: 1px solid var(--border);
}
.badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 999px;
  border: 1px solid transparent;
}
.badge--block  { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
.badge--var    { background: #ede9fe; color: #7c3aed; border-color: #c4b5fd; }
.badge--cond   { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
.badge--items  { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
.badge--look   { background: #ccfbf1; color: #0f766e; border-color: #5eead4; }
.badge--put    { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
.badge--enemy  { background: #ffedd5; color: #9a3412; border-color: #fdba74; }
.badge--count  { background: #f3e8ff; color: #7e22ce; border-color: #d8b4fe; }
.badge--goal   { background: #f0fdf4; color: #166534; border-color: #86efac; }
.badge--survive{ background: #fff1f2; color: #9f1239; border-color: #fda4af; }
.badge--ai-r   { background: #fafaf9; color: #57534e; border-color: #a8a29e; }
.badge--ai-p   { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
.badge--new-sys{ background: #fdf4ff; color: #86198f; border-color: #e879f9; }

/* card body */
.card-body { padding: 12px 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

.field-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: #94a3b8; margin-bottom: 3px;
}
.field-value { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
.field-mono  { font-family: monospace; font-size: 11px; }

/* ── MAP ── */
.maps-wrap { display: flex; flex-wrap: wrap; gap: 12px; }
.map-block { }
.map-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; }
.map-grid {
  display: inline-grid;
  gap: 1px;
  background: #e2e8f0;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  padding: 4px;
}
.map-row { display: flex; }
.cell {
  width: 16px; height: 16px;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 800; font-family: monospace;
}
.c-wall  { background: #1e293b; }
.c-floor { background: #f8fafc; }
.c-item  { background: #fbbf24; }
.c-cool  { background: #38bdf8; }
.c-hot   { background: #fb7185; }
.c-goal  { background: #34d399; }

/* variant note */
.variant-note {
  font-size: 10px; color: #64748b; background: #f8fafc;
  border: 1px dashed #cbd5e1; border-radius: 10px; padding: 6px 10px;
}

/* ── SUMMARY TABLE ── */
.summary-section { margin-bottom: 48px; }
.summary-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  background: var(--panel-strong);
  border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 8px 24px rgba(15,23,42,0.08);
}
.summary-table th {
  background: #f1f5f9; padding: 10px 14px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: #475569; text-align: left;
  border-bottom: 1px solid #e2e8f0;
}
.summary-table td {
  padding: 8px 14px; font-size: 12px;
  border-bottom: 1px solid #f1f5f9; vertical-align: middle;
}
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr:hover td { background: #f8fafc; }
.num-cell { font-family: var(--font-display); font-weight: 800; font-size: 14px; }

/* ── SCROLL TARGET ── */
.phase-anchor { scroll-margin-top: 80px; }

@media (max-width: 600px) {
  .stage-grid { grid-template-columns: 1fr; }
  .header-inner { padding: 10px 16px; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <span class="header-logo">CH<span>aser</span></span>
      <span class="header-sub">Tutorial Stage Review</span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="btn-bs">ブロックセット</button>
      <div class="header-count">50 Stages · 8 Phases</div>
    </div>
  </div>
</header>

<div class="bs-modal" id="bs-modal">
  <div class="bs-modal-inner">
    <button class="bs-modal-close" id="bs-modal-close" aria-label="閉じる">×</button>
    <div class="bs-modal-title">ブロックセット一覧</div>
    <div class="bs-modal-sub">各レベルで使えるブロック群。下位のセットは上位を含む（インクルード方式）。</div>
    <div id="bs-modal-body"></div>
  </div>
</div>

<nav class="phase-nav" aria-label="フェーズ">
  <a class="phase-tab" data-ph="A" href="#phase-A">A 条件なし</a>
  <a class="phase-tab" data-ph="B" href="#phase-B">B 壁判定</a>
  <a class="phase-tab" data-ph="C" href="#phase-C">C 変数</a>
  <a class="phase-tab" data-ph="D" href="#phase-D">D アイテム</a>
  <a class="phase-tab" data-ph="E" href="#phase-E">E LOOK/SEARCH</a>
  <a class="phase-tab" data-ph="F" href="#phase-F">F PUT</a>
  <a class="phase-tab" data-ph="G" href="#phase-G">G 動く敵</a>
  <a class="phase-tab" data-ph="H" href="#phase-H">H SEARCH×総合</a>
</nav>

<main class="main" id="main"></main>

<script>
/* ══════════════════════════════════════════
   BLOCK SETS INFO
══════════════════════════════════════════ */
const BLOCK_SETS_INFO = [
  { name:'BASIC', range:'Step 01〜', cls:'badge--block',
    desc:'毎ターン同じ行動を繰り返す。最小構成。',
    blocks:['chaser_on_turn','chaser_action_walk','chaser_turn_end'] },
  { name:'CHECK', range:'Step 04〜', cls:'badge--cond', inherits:'BASIC',
    desc:'条件分岐と壁判定。「毎ターン判断する」反応型の核心。',
    blocks:['controls_if','logic_compare','chaser_is_tile','chaser_tile_value','chaser_get_tile','math_number'] },
  { name:'STATE', range:'Step 11〜', cls:'badge--var', inherits:'CHECK',
    desc:'変数による状態管理。過去の観測・判断を記憶する。',
    blocks:['chaser_on_start','chaser_state_*','chaser_last_direction','chaser_direction_value','chaser_get_around','chaser_action_walk_last','chaser_turn_number','math_modulo','logic_operation'] },
  { name:'LOOK', range:'Step 21〜', cls:'badge--look', inherits:'STATE',
    desc:'look アクションで 3×3 視野を観測する。観測結果は配列で取得。',
    blocks:['chaser_action_look','chaser_observation'] },
  { name:'SEARCH', range:'Step 23〜', cls:'badge--look', inherits:'LOOK',
    desc:'search アクションで直線9マスを観測。put でブロック設置・敵撃破。',
    blocks:['chaser_action_search','chaser_action_put'] },
  { name:'ENEMY', range:'Step 33〜', cls:'badge--enemy', inherits:'SEARCH',
    desc:'動く敵（random/proximity AI）に対応。ランダム歩行ブロック追加。',
    blocks:['chaser_action_walk_random'] },
  { name:'COUNT', range:'Step 43〜', cls:'badge--count', inherits:'ENEMY',
    desc:'観測結果からアイテム数を集計。複数バリアントの汎用処理に利用。',
    blocks:['chaser_view_count_tile'] },
];

function renderBlockSetsModal() {
  return BLOCK_SETS_INFO.map(bs => `
    <div class="bs-card">
      <div class="bs-card-head">
        <span class="badge ${bs.cls}">${bs.name}</span>
        <span class="bs-card-range">${bs.range}</span>
        ${bs.inherits ? `<span class="bs-card-inherits">⊃ ${bs.inherits} のすべて</span>` : ''}
      </div>
      <div class="bs-card-desc">${bs.desc}</div>
      <div class="bs-card-blocks">${bs.blocks.map(b=>`<span class="bs-block-chip">${b}</span>`).join('')}</div>
    </div>`).join('');
}

document.getElementById('btn-bs').addEventListener('click', () => {
  document.getElementById('bs-modal-body').innerHTML = renderBlockSetsModal();
  document.getElementById('bs-modal').classList.add('show');
});
document.getElementById('bs-modal-close').addEventListener('click', () => {
  document.getElementById('bs-modal').classList.remove('show');
});
document.getElementById('bs-modal').addEventListener('click', (e) => {
  if (e.target.id === 'bs-modal') document.getElementById('bs-modal').classList.remove('show');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('bs-modal').classList.remove('show');
});

/* ── colour helpers ── */
const PH = {
  A:{color:'#64748b',bg:'#f1f5f9'},
  B:{color:'#0ea5e9',bg:'#e0f2fe'},
  C:{color:'#8b5cf6',bg:'#ede9fe'},
  D:{color:'#f59e0b',bg:'#fef3c7'},
  E:{color:'#14b8a6',bg:'#ccfbf1'},
  F:{color:'#ef4444',bg:'#fee2e2'},
  G:{color:'#f97316',bg:'#ffedd5'},
  H:{color:'#a855f7',bg:'#f3e8ff'},
};

function renderMap(rows) {
  const map = {'#':'wall','.':'floor','I':'item','C':'cool','H':'hot','G':'goal',' ':'floor'};
  const label = {wall:'',floor:'',item:'I',cool:'C',hot:'H',goal:'G'};
  return rows.map(row =>
    `<div class="map-row">${[...row].map(ch=>{
      const cls = map[ch]||'floor';
      return `<div class="cell c-${cls}">${label[cls]||''}</div>`;
    }).join('')}</div>`
  ).join('');
}

function mapBlock(varLabel, rows, note='') {
  if (!rows || !rows.length) return '';
  return `<div class="map-block">
    <div class="map-label">${varLabel}</div>
    <div class="map-grid">${renderMap(rows)}</div>
    ${note?`<div style="font-size:10px;color:#64748b;margin-top:3px">${note}</div>`:''}
  </div>`;
}

function blockBadge(set) {
  const cls = {
    BASIC:'badge--block',CHECK:'badge--cond',STATE:'badge--var',
    LOOK:'badge--look',SEARCH:'badge--look',ENEMY:'badge--enemy',COUNT:'badge--count'
  };
  return `<span class="badge ${cls[set]||'badge--block'}">${set}</span>`;
}

function condBadge(cond) {
  const c = cond.toLowerCase();
  let cls = 'badge--goal';
  if (c.includes('put')) cls='badge--put';
  else if (c.includes('survive')) cls='badge--survive';
  else if (c.includes('items')) cls='badge--items';
  return `<span class="badge ${cls}">${cond}</span>`;
}

function aiBadge(ai) {
  if (!ai) return '';
  if (ai==='random')    return `<span class="badge badge--ai-r">AI: random</span>`;
  if (ai==='proximity') return `<span class="badge badge--ai-p">AI: proximity</span>`;
  if (ai==='patrol')    return `<span class="badge badge--ai-r">AI: patrol</span>`;
  return `<span class="badge badge--ai-r">AI: ${ai}</span>`;
}

function stageCard(s, ph) {
  const phColor = PH[ph].color;
  const badgeHTML = [
    blockBadge(s.blockSet),
    `<span class="badge badge--block">${s.variants}バリアント</span>`,
    condBadge(s.cond),
    s.ai ? aiBadge(s.ai) : '',
    s.newSys ? `<span class="badge badge--new-sys">⚠ ${s.newSys}</span>` : '',
  ].filter(Boolean).join('');

  const mapsHTML = s.maps && s.maps.length
    ? `<div>
        <div class="field-label">マップ</div>
        <div class="maps-wrap">${s.maps.map(m=>mapBlock(m.label, m.rows, m.note||'')).join('')}</div>
      </div>`
    : s.mapsNote

    <td><span class="badge" style="background:${ph.bg};color:${ph.color};border-color:${ph.color}">${s.phase}</span></td>
    <td><strong>${s.title}</strong><br><span style="font-size:10px;color:#94a3b8;font-family:monospace">${s.id}</span></td>
    <td>${blockBadge(s.blockSet)}</td>
    <td style="text-align:center">${s.variants}</td>
    <td>${condBadge(s.cond)}</td>
    <td>${s.ai ? aiBadge(s.ai) : '<span style="color:#cbd5e1;font-size:11px">—</span>'}</td>
  </tr>`;
}).join('');

main.innerHTML += `
<section class="summary-section">
  <div style="margin-bottom:12px">
    <h2 style="font-size:18px;font-weight:700;color:#0f172a">全ステージ一覧</h2>
    <p style="font-size:12px;color:#64748b;margin-top:4px">50ステージ / フェーズA〜H</p>
  </div>
  <table class="summary-table">
    <thead>
      <tr>
        <th>#</th><th>Ph</th><th>タイトル</th>
        <th>ブロックセット</th><th>V</th><th>クリア条件</th><th>敵AI</th>
      </tr>
    </thead>
    <tbody>${summaryRows}</tbody>
  </table>
</section>
`;

PHASES.forEach(ph => {
  const phStyle = PH[ph.id];
  main.innerHTML += `
<section class="phase-section phase-anchor" id="phase-${ph.id}">
  <div class="phase-header">
    <div class="phase-label" style="color:${phStyle.color}">Phase ${ph.id}</div>
    <div>
      <div class="phase-name">${ph.name}</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px">${ph.desc}</div>
    </div>
    <div class="phase-range">Step ${ph.range}</div>
  </div>
  <div class="stage-grid">
    ${ph.stages.map(s => stageCard(s, ph.id)).join('')}
  </div>
</section>`;
});
</script>
</body>
</html>
